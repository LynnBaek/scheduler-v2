<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>my//planner</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
:root {
  --bg:#0e0e12; --surface:#16161e; --surface2:#1e1e2a;
  --border:#2a2a3a; --accent:#7c6af7; --accent2:#f26abe;
  --accent3:#4ecdc4; --text:#e8e8f0; --text-dim:#7a7a9a;
  --red:#f26a6a; --yellow:#f2c86a; --green:#6af2a0; --gold:#f2d06a;
}
*{margin:0;padding:0;box-sizing:border-box;}
body{background:var(--bg);color:var(--text);font-family:'Noto Sans KR',sans-serif;min-height:100vh;display:flex;flex-direction:column;}

/* ── AUTH ── */
#authScreen{position:fixed;inset:0;background:var(--bg);display:flex;align-items:center;justify-content:center;z-index:9999;}
.auth-box{background:var(--surface);border:1px solid var(--border);border-radius:16px;padding:40px 36px;width:100%;max-width:380px;display:flex;flex-direction:column;gap:14px;text-align:center;}
.auth-logo{font-family:'DM Mono',monospace;font-size:1.3rem;color:var(--accent);}
.auth-logo span{color:var(--accent2);}
.auth-tabs{display:flex;border:1px solid var(--border);border-radius:10px;overflow:hidden;}
.auth-tab{flex:1;padding:9px;background:none;border:none;color:var(--text-dim);font-family:'Noto Sans KR',sans-serif;font-size:0.85rem;cursor:pointer;transition:all 0.15s;}
.auth-tab.active{background:var(--accent);color:white;}
.auth-field{display:flex;flex-direction:column;gap:5px;text-align:left;}
.auth-label{font-size:0.75rem;color:var(--text-dim);}
.auth-input{width:100%;background:var(--surface2);border:1px solid var(--border);border-radius:10px;padding:11px 14px;color:var(--text);font-family:'Noto Sans KR',sans-serif;font-size:0.9rem;outline:none;transition:border-color 0.15s;}
.auth-input:focus{border-color:var(--accent);}
.auth-btn{background:var(--accent);border:none;border-radius:10px;padding:12px;color:white;font-family:'Noto Sans KR',sans-serif;font-size:0.95rem;font-weight:500;cursor:pointer;transition:background 0.15s;margin-top:4px;}
.auth-btn:hover{background:#6a58e0;}
.auth-btn:disabled{opacity:0.5;cursor:not-allowed;}
.auth-msg{font-size:0.78rem;min-height:18px;}
.auth-msg.err{color:var(--red);}
.auth-msg.ok{color:var(--green);}
@keyframes shake{0%,100%{transform:translateX(0)}25%{transform:translateX(-6px)}75%{transform:translateX(6px)}}

/* ── HEADER ── */
header{padding:10px 24px;display:flex;align-items:center;justify-content:space-between;border-bottom:1px solid var(--border);background:var(--surface);position:sticky;top:0;z-index:100;gap:16px;height:52px;}
.logo{font-family:'DM Mono',monospace;font-size:1.05rem;color:var(--accent);flex-shrink:0;}
.logo span{color:var(--accent2);}
.nav-tabs{display:flex;gap:3px;background:var(--surface2);border:1px solid var(--border);border-radius:12px;padding:4px;}
.nav-tab{padding:6px 24px;background:none;border:none;border-radius:8px;color:var(--text-dim);font-family:'Noto Sans KR',sans-serif;font-size:0.85rem;font-weight:500;cursor:pointer;transition:all 0.15s;white-space:nowrap;}
.nav-tab:hover{color:var(--text);}
.nav-tab.active{background:var(--accent);color:white;}
.header-right{display:flex;align-items:center;gap:10px;flex-shrink:0;}
.today-badge{font-family:'DM Mono',monospace;font-size:0.73rem;color:var(--text-dim);background:var(--surface2);border:1px solid var(--border);padding:4px 10px;border-radius:20px;}
.sync-indicator{font-family:'DM Mono',monospace;font-size:0.7rem;padding:4px 10px;border-radius:20px;border:1px solid var(--border);display:flex;align-items:center;gap:5px;transition:all 0.3s;}
.sync-indicator.syncing{color:var(--yellow);border-color:var(--yellow);}
.sync-indicator.synced{color:var(--green);border-color:var(--green);}
.sync-indicator.error{color:var(--red);border-color:var(--red);}
.sync-dot{width:6px;height:6px;border-radius:50%;background:currentColor;}
.syncing .sync-dot{animation:blink 0.8s infinite;}
@keyframes blink{0%,100%{opacity:1}50%{opacity:0.2}}
.logout-btn{background:none;border:1px solid var(--border);border-radius:8px;padding:5px 12px;color:var(--text-dim);font-size:0.78rem;cursor:pointer;font-family:'Noto Sans KR',sans-serif;transition:all 0.15s;}
.logout-btn:hover{border-color:var(--red);color:var(--red);}

/* ── MAIN / TAB PANES ── */
main{flex:1;overflow:hidden;height:calc(100vh - 52px);}
.tab-pane{display:none;flex-direction:column;height:100%;overflow:hidden;}
.tab-pane.active{display:flex;}

/* ── SHARED NAV BAR ── */
.view-nav-bar{padding:10px 20px;display:flex;align-items:center;justify-content:space-between;border-bottom:1px solid var(--border);background:var(--surface);flex-shrink:0;gap:12px;}
.view-nav-title{font-size:1rem;font-weight:500;}
.view-nav-btns{display:flex;gap:6px;align-items:center;}
.nav-arrow{background:none;border:1px solid var(--border);color:var(--text-dim);width:30px;height:30px;border-radius:8px;cursor:pointer;font-size:1rem;display:flex;align-items:center;justify-content:center;transition:all 0.15s;}
.nav-arrow:hover{border-color:var(--accent);color:var(--accent);}
.nav-today-btn{font-size:0.78rem;color:var(--accent);background:rgba(124,106,247,0.1);border:1px solid rgba(124,106,247,0.3);border-radius:8px;padding:5px 14px;cursor:pointer;transition:all 0.15s;white-space:nowrap;}
.nav-today-btn:hover{background:rgba(124,106,247,0.2);}
.nav-icon-btn{background:none;border:1px solid var(--border);border-radius:8px;padding:5px 12px;color:var(--text-dim);font-size:0.78rem;cursor:pointer;font-family:'Noto Sans KR',sans-serif;transition:all 0.15s;white-space:nowrap;}
.nav-icon-btn:hover{border-color:var(--accent);color:var(--accent);}

/* ── SPINNER ── */
.spinner{width:16px;height:16px;border:2px solid var(--border);border-top-color:var(--accent);border-radius:50%;animation:spin 0.6s linear infinite;display:inline-block;}
@keyframes spin{to{transform:rotate(360deg)}}
.loading-row{display:flex;align-items:center;gap:10px;color:var(--text-dim);padding:40px;justify-content:center;font-size:0.88rem;}
@keyframes slideIn{from{opacity:0;transform:translateY(-6px)}to{opacity:1;transform:translateY(0)}}

/* ══════════════════════════════════════
   ── 월간 뷰 ──
══════════════════════════════════════ */
.month-cal-wrap{flex-shrink:0;padding:10px 14px 0;}
.month-cal-header{display:grid;grid-template-columns:repeat(7,1fr);margin-bottom:4px;}
.month-cal-dow{text-align:center;font-family:'DM Mono',monospace;font-size:0.68rem;color:var(--text-dim);padding:4px 0;}
.month-cal-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:3px;}

.month-cell{display:flex;flex-direction:column;align-items:center;padding:7px 4px 5px;border-radius:10px;cursor:pointer;transition:all 0.15s;border:1px solid transparent;position:relative;background:var(--surface);min-height:54px;}
.month-cell:hover{background:var(--surface2);border-color:var(--border);}
.month-cell.other-month{opacity:0.3;}
.month-cell.today .cell-num{color:var(--accent);font-weight:700;}
.month-cell.today{border-color:rgba(124,106,247,0.35);}
.month-cell.selected{background:rgba(124,106,247,0.14);border-color:var(--accent)!important;}
.cell-num{font-family:'DM Mono',monospace;font-size:0.82rem;line-height:1;}
.cell-dots{display:flex;gap:2px;margin-top:4px;flex-wrap:wrap;justify-content:center;}
.cell-dot{width:5px;height:5px;border-radius:50%;background:var(--accent2);transition:opacity 0.15s;}
.cell-dot.done{opacity:0.28;}

/* day detail panel */
.day-detail-panel{flex:1;overflow-y:auto;border-top:2px solid var(--accent);background:var(--surface);display:none;flex-direction:column;min-height:0;}
.day-detail-panel.open{display:flex;}
.day-detail-panel::-webkit-scrollbar{width:4px;}
.day-detail-panel::-webkit-scrollbar-thumb{background:var(--border);border-radius:2px;}
.day-detail-header{padding:14px 20px 8px;display:flex;align-items:center;justify-content:space-between;flex-shrink:0;}
.day-detail-title{font-size:1rem;font-weight:500;}
.day-detail-title .sub{font-size:0.7rem;color:var(--accent);font-family:'DM Mono',monospace;margin-left:8px;background:rgba(124,106,247,0.12);padding:2px 8px;border-radius:10px;}
.day-detail-close{background:none;border:none;color:var(--text-dim);font-size:1.1rem;cursor:pointer;padding:3px 7px;border-radius:6px;transition:color 0.15s;}
.day-detail-close:hover{color:var(--red);}

.todo-add-row{padding:0 20px 10px;display:flex;gap:8px;flex-shrink:0;}
.todo-add-input{flex:1;background:var(--surface2);border:1px solid var(--border);border-radius:10px;padding:9px 14px;color:var(--text);font-family:'Noto Sans KR',sans-serif;font-size:0.88rem;outline:none;transition:border-color 0.15s;}
.todo-add-input:focus{border-color:var(--accent);}
.todo-add-input::placeholder{color:var(--text-dim);}
.todo-add-btn{background:var(--accent);border:none;border-radius:10px;padding:9px 16px;color:white;font-family:'Noto Sans KR',sans-serif;font-size:0.84rem;cursor:pointer;transition:all 0.15s;flex-shrink:0;}
.todo-add-btn:hover{background:#6a58e0;}

.todo-list{padding:0 20px 20px;display:flex;flex-direction:column;gap:6px;}
.todo-item{display:flex;align-items:center;gap:10px;background:var(--surface2);border:1px solid var(--border);border-radius:10px;padding:10px 12px;animation:slideIn 0.18s ease;transition:border-color 0.15s;}
.todo-item:hover{border-color:rgba(124,106,247,0.3);}
.todo-check{width:22px;height:22px;border-radius:50%;border:2px solid var(--border);background:none;cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0;transition:all 0.2s;font-size:0.7rem;color:transparent;}
.todo-check:hover{border-color:var(--accent);}
.todo-check.done{background:var(--accent);border-color:var(--accent);color:white;}
.todo-text{flex:1;font-size:0.88rem;line-height:1.4;transition:all 0.15s;}
.todo-text.done{text-decoration:line-through;color:var(--text-dim);}
.todo-del{background:none;border:none;color:var(--text-dim);cursor:pointer;font-size:0.72rem;opacity:0;transition:all 0.15s;padding:3px 5px;border-radius:4px;}
.todo-item:hover .todo-del{opacity:1;}
.todo-del:hover{color:var(--red);}
.todo-empty{color:var(--text-dim);font-size:0.84rem;padding:24px 20px;text-align:center;line-height:1.8;}

/* ══════════════════════════════════════
   ── 주간 뷰 ──
══════════════════════════════════════ */
.weekly-scroll{flex:1;overflow:auto;}
.weekly-scroll::-webkit-scrollbar{width:6px;height:6px;}
.weekly-scroll::-webkit-scrollbar-thumb{background:var(--border);border-radius:3px;}
.weekly-scroll::-webkit-scrollbar-corner{background:var(--bg);}

.week-table{border-collapse:collapse;min-width:860px;width:100%;font-size:0.8rem;table-layout:fixed;}
.week-table th,.week-table td{border:1px solid var(--border);}

/* header */
.wth-label{background:var(--surface2);color:var(--text-dim);font-size:0.68rem;padding:8px 6px;text-align:center;width:68px;min-width:68px;}
.wth-day{background:var(--surface2);text-align:center;padding:7px 4px;}
.wth-day-name{font-family:'DM Mono',monospace;font-size:0.72rem;color:var(--text-dim);letter-spacing:0.04em;}
.wth-day-date{font-family:'DM Mono',monospace;font-size:1rem;font-weight:600;color:var(--text);margin-top:2px;}
.wth-day.is-today .wth-day-name,.wth-day.is-today .wth-day-date{color:var(--accent);}
.wth-day.is-today{border-bottom:2px solid var(--accent);}

/* section header rows */
.week-section-hd td{background:var(--surface);padding:4px 10px;font-size:0.66rem;color:var(--accent);letter-spacing:0.08em;font-weight:600;text-transform:uppercase;}

/* item label + check */
.week-label-cell{padding:5px 8px;background:var(--surface2);color:var(--text-dim);font-size:0.78rem;text-align:right;white-space:nowrap;vertical-align:middle;max-width:68px;overflow:hidden;text-overflow:ellipsis;}
.week-check-cell{padding:4px 0;text-align:center;vertical-align:middle;cursor:pointer;}
.week-check-cell:hover{background:rgba(124,106,247,0.07);}
.week-check-btn{width:22px;height:22px;border-radius:50%;border:2px solid var(--border);background:none;cursor:pointer;display:inline-flex;align-items:center;justify-content:center;transition:all 0.18s;font-size:0.65rem;color:transparent;vertical-align:middle;}
.week-check-btn:hover{border-color:var(--accent);}
.week-check-btn.done{background:var(--accent);border-color:var(--accent);color:white;}

/* time rows */
.time-hour-cell{padding:0 5px;background:var(--surface);color:var(--text-dim);font-family:'DM Mono',monospace;font-size:0.7rem;text-align:right;vertical-align:middle;width:68px;height:30px;white-space:nowrap;border-right:2px solid var(--border);}
.time-block-cell{padding:0;height:30px;cursor:pointer;transition:background 0.08s;vertical-align:top;position:relative;overflow:hidden;}
.time-block-cell:hover .time-hover-overlay{opacity:1;}
.time-hover-overlay{position:absolute;inset:0;background:rgba(255,255,255,0.08);opacity:0;transition:opacity 0.1s;pointer-events:none;}
.time-block-inner{width:100%;height:100%;display:flex;align-items:center;justify-content:center;padding:0 3px;}
.time-block-label{font-size:0.74rem;font-weight:700;color:rgba(0,0,0,0.72);text-align:center;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;width:100%;}
/* continuation: same block as above — remove top border */
.time-block-cell.cont{border-top-color:transparent!important;}
.time-block-cell.cont .time-block-label{visibility:hidden;}

/* midnight divider row */
.week-midnight-row td{border-top:2px dashed var(--accent3)!important;}
.time-hour-cell.midnight-lbl{color:var(--accent3)!important;}

/* ══════════════════════════════════════
   ── 일간 뷰 ──
══════════════════════════════════════ */
.daily-content{flex:1;overflow-y:auto;padding:24px;display:flex;flex-direction:column;gap:14px;max-width:720px;width:100%;margin:0 auto;}
.daily-content::-webkit-scrollbar{width:4px;}
.daily-content::-webkit-scrollbar-thumb{background:var(--border);border-radius:2px;}
.diary-label{font-size:0.78rem;color:var(--text-dim);font-family:'DM Mono',monospace;}
.diary-textarea{flex:1;min-height:320px;background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:18px;color:var(--text);font-family:'Noto Sans KR',sans-serif;font-size:0.92rem;line-height:1.85;outline:none;resize:vertical;transition:border-color 0.15s;}
.diary-textarea:focus{border-color:var(--accent);}
.diary-textarea::placeholder{color:var(--text-dim);}
.diary-save-row{display:flex;align-items:center;justify-content:space-between;flex-shrink:0;}
.diary-status{font-size:0.72rem;color:var(--green);font-family:'DM Mono',monospace;}
.diary-save-btn{background:var(--accent);border:none;border-radius:8px;padding:8px 22px;color:white;font-family:'Noto Sans KR',sans-serif;font-size:0.85rem;font-weight:500;cursor:pointer;transition:all 0.15s;}
.diary-save-btn:hover{background:#6a58e0;}

/* ══════════════════════════════════════
   ── TIME BLOCK POPUP ──
══════════════════════════════════════ */
#timePopup{position:fixed;z-index:500;background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:14px;display:flex;flex-direction:column;gap:10px;box-shadow:0 10px 40px rgba(0,0,0,0.55);width:220px;}
#timePopup.hidden{display:none;}
.popup-time-label{font-size:0.7rem;color:var(--text-dim);font-family:'DM Mono',monospace;}
.popup-input{width:100%;background:var(--surface2);border:1px solid var(--border);border-radius:8px;padding:8px 12px;color:var(--text);font-family:'Noto Sans KR',sans-serif;font-size:0.88rem;outline:none;transition:border-color 0.15s;}
.popup-input:focus{border-color:var(--accent);}
.popup-input::placeholder{color:var(--text-dim);}
.popup-colors{display:flex;gap:5px;flex-wrap:wrap;align-items:center;}
.popup-color-btn{width:24px;height:24px;border-radius:6px;border:2px solid transparent;cursor:pointer;transition:all 0.15s;flex-shrink:0;}
.popup-color-btn:hover{transform:scale(1.18);}
.popup-color-btn.selected{border-color:white;transform:scale(1.12);}
.popup-color-clear{background:var(--surface2)!important;border:1px solid var(--border)!important;display:flex;align-items:center;justify-content:center;font-size:0.7rem;color:var(--text-dim);}
.popup-btns{display:flex;gap:6px;}
.popup-confirm{flex:1;background:var(--accent);border:none;border-radius:8px;padding:7px;color:white;font-family:'Noto Sans KR',sans-serif;font-size:0.82rem;cursor:pointer;transition:background 0.15s;}
.popup-confirm:hover{background:#6a58e0;}
.popup-cancel{background:none;border:1px solid var(--border);border-radius:8px;padding:7px 10px;color:var(--text-dim);font-family:'Noto Sans KR',sans-serif;font-size:0.82rem;cursor:pointer;transition:all 0.15s;}
.popup-cancel:hover{border-color:var(--red);color:var(--red);}

/* ══════════════════════════════════════
   ── WEEK SETTINGS MODAL ──
══════════════════════════════════════ */
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,0.65);z-index:600;display:flex;align-items:center;justify-content:center;}
.modal-overlay.hidden{display:none;}
.modal-box{background:var(--surface);border:1px solid var(--border);border-radius:16px;padding:28px;width:100%;max-width:460px;max-height:82vh;overflow-y:auto;display:flex;flex-direction:column;gap:14px;}
.modal-box::-webkit-scrollbar{width:4px;}
.modal-box::-webkit-scrollbar-thumb{background:var(--border);border-radius:2px;}
.modal-title{font-size:1rem;font-weight:500;display:flex;align-items:center;justify-content:space-between;}
.modal-close{background:none;border:none;color:var(--text-dim);font-size:1.2rem;cursor:pointer;padding:2px 6px;border-radius:4px;transition:color 0.15s;}
.modal-close:hover{color:var(--red);}
.modal-section-title{font-size:0.75rem;color:var(--accent);letter-spacing:0.07em;font-weight:600;margin-top:4px;}
.modal-items-list{display:flex;flex-direction:column;gap:6px;}
.modal-item-row{display:flex;align-items:center;gap:8px;background:var(--surface2);border:1px solid var(--border);border-radius:10px;padding:8px 12px;}
.modal-item-input{flex:1;background:transparent;border:none;outline:none;color:var(--text);font-family:'Noto Sans KR',sans-serif;font-size:0.88rem;}
.modal-item-del{background:none;border:none;color:var(--text-dim);cursor:pointer;font-size:0.82rem;padding:2px 5px;border-radius:4px;transition:color 0.15s;flex-shrink:0;}
.modal-item-del:hover{color:var(--red);}
.modal-add-row{display:flex;gap:8px;}
.modal-add-input{flex:1;background:var(--surface2);border:1px solid var(--border);border-radius:8px;padding:8px 12px;color:var(--text);font-family:'Noto Sans KR',sans-serif;font-size:0.85rem;outline:none;transition:border-color 0.15s;}
.modal-add-input:focus{border-color:var(--accent);}
.modal-add-btn{background:var(--accent);border:none;border-radius:8px;padding:8px 14px;color:white;font-size:0.82rem;cursor:pointer;font-family:'Noto Sans KR',sans-serif;transition:background 0.15s;white-space:nowrap;}
.modal-add-btn:hover{background:#6a58e0;}
.modal-divider{height:1px;background:var(--border);margin:4px 0;}
.modal-save-btn{background:var(--accent);border:none;border-radius:10px;padding:11px;color:white;font-family:'Noto Sans KR',sans-serif;font-size:0.9rem;font-weight:500;cursor:pointer;transition:background 0.15s;margin-top:4px;}
.modal-save-btn:hover{background:#6a58e0;}
</style>
</head>
<body>

<!-- ── AUTH ── -->
<div id="authScreen">
  <div class="auth-box">
    <div class="auth-logo">my<span>//</span>planner</div>
    <div class="auth-tabs">
      <button class="auth-tab active" id="tabLogin">로그인</button>
      <button class="auth-tab" id="tabSignup">회원가입</button>
    </div>
    <div class="auth-field"><label class="auth-label">이메일</label><input class="auth-input" id="authEmail" type="email" placeholder="example@email.com"></div>
    <div class="auth-field"><label class="auth-label">비밀번호</label><input class="auth-input" id="authPassword" type="password" placeholder="6자 이상"></div>
    <div class="auth-msg" id="authMsg"></div>
    <button class="auth-btn" id="authBtn">로그인</button>
  </div>
</div>

<!-- ── HEADER ── -->
<header>
  <div class="logo">my<span>//</span>planner</div>
  <nav class="nav-tabs">
    <button class="nav-tab active" data-tab="monthly">월간</button>
    <button class="nav-tab" data-tab="weekly">주간</button>
    <button class="nav-tab" data-tab="daily">일간</button>
  </nav>
  <div class="header-right">
    <div class="sync-indicator syncing" id="syncIndicator"><div class="sync-dot"></div><span id="syncText">연결 중</span></div>
    <div class="today-badge" id="headerDate"></div>
    <button class="logout-btn" id="logoutBtn">로그아웃</button>
  </div>
</header>

<main>

  <!-- ━━━━ 월간 탭 ━━━━ -->

// ── 유틸 ──
function fmtDate(d){ return d instanceof Date ? d.toISOString().slice(0,10) : d; }
function esc(s){ return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }
function dispHour(h){ if(h===0)return 12; return h<=12?h:h-12; }
function setSyncState(s,m){ const e=document.getElementById('syncIndicator'); e.className='sync-indicator '+s; document.getElementById('syncText').textContent=m; }
function getMonday(d){ const dt=new Date(d); const dw=dt.getDay(); dt.setDate(dt.getDate()-(dw===0?6:dw-1)); return dt; }
function getWeekDays(mon){ const arr=[]; for(let i=0;i<7;i++){const d=new Date(mon);d.setDate(d.getDate()+i);arr.push(d);} return arr; }

// ── AUTH ──
(function(){
  const screen=document.getElementById('authScreen');
  const emailEl=document.getElementById('authEmail'),passEl=document.getElementById('authPassword');
  const btnEl=document.getElementById('authBtn'),msgEl=document.getElementById('authMsg');
  let mode='login';
  function setMode(m){
    mode=m;
    document.getElementById('tabLogin').classList.toggle('active',m==='login');
    document.getElementById('tabSignup').classList.toggle('active',m==='signup');
    btnEl.textContent=m==='login'?'로그인':'회원가입';
    msgEl.textContent=''; msgEl.className='auth-msg';
  }
  document.getElementById('tabLogin').addEventListener('click',()=>setMode('login'));
  document.getElementById('tabSignup').addEventListener('click',()=>setMode('signup'));
  async function doAuth(){
    const email=emailEl.value.trim(),pass=passEl.value;
    if(!email||!pass){showMsg('이메일과 비밀번호를 입력하세요.','err');return;}
    btnEl.disabled=true;btnEl.textContent='처리 중...';
    if(mode==='login'){
      const {data,error}=await sb.auth.signInWithPassword({email,password:pass});
      if(error)showMsg('이메일 또는 비밀번호가 틀렸습니다.','err');
      else{currentUser=data.user;screen.style.display='none';initApp();}
    }else{
      const {data,error}=await sb.auth.signUp({email,password:pass});
      if(error)showMsg(error.message,'err');
      else if(data.user&&data.user.identities&&data.user.identities.length===0)showMsg('이미 가입된 이메일입니다.','err');
      else{showMsg('가입 완료! 이메일 확인 후 로그인하세요.','ok');setMode('login');}
    }
    btnEl.disabled=false;btnEl.textContent=mode==='login'?'로그인':'회원가입';
  }
  function showMsg(txt,type){
    msgEl.textContent=txt;msgEl.className='auth-msg '+type;
    if(type==='err'){passEl.style.animation='shake 0.3s ease';setTimeout(()=>passEl.style.animation='',400);}
  }
  btnEl.addEventListener('click',doAuth);
  passEl.addEventListener('keydown',e=>{if(e.key==='Enter')doAuth();});
  sb.auth.getSession().then(({data})=>{
    if(data.session){currentUser=data.session.user;screen.style.display='none';initApp();}
    else setTimeout(()=>emailEl.focus(),100);
  });
  document.getElementById('logoutBtn').addEventListener('click',async()=>{
    if(!confirm('로그아웃 할까요?'))return;
    await sb.auth.signOut();currentUser=null;
    screen.style.display='flex';passEl.value='';setMode('login');
  });
})();

function renderMonthCal(){
  document.getElementById('monthlyTitle').textContent=`${monthlyYear}년 ${monthlyMonth+1}월`;
  closeDayDetail();

  // 요일 헤더
  const hdr=document.getElementById('monthCalHeader');
  hdr.innerHTML='';
  DAYS_KR.forEach(d=>{
    const el=document.createElement('div');el.className='month-cal-dow';el.textContent=d;hdr.appendChild(el);
  });

  const grid=document.getElementById('monthCalGrid');
  grid.innerHTML='';

  const firstDay=new Date(monthlyYear,monthlyMonth,1).getDay(); // 0=Sun
  const daysInMonth=new Date(monthlyYear,monthlyMonth+1,0).getDate();
  const daysInPrev=new Date(monthlyYear,monthlyMonth,0).getDate();
  // 월요일 시작 오프셋 (Sun→6, Mon→0, Tue→1 ...)
  const startOffset=(firstDay+6)%7;

  for(let i=0;i<startOffset;i++) grid.appendChild(makeMonthCell(monthlyYear,monthlyMonth-1,daysInPrev-startOffset+1+i,true));
  for(let d=1;d<=daysInMonth;d++) grid.appendChild(makeMonthCell(monthlyYear,monthlyMonth,d,false));
  const rem=(startOffset+daysInMonth)%7;
  if(rem>0) for(let d=1;d<=7-rem;d++) grid.appendChild(makeMonthCell(monthlyYear,monthlyMonth+1,d,true));
}

function makeMonthCell(y,m,d,other){
  let ry=y,rm=m;
  if(rm<0){ry--;rm=11;}if(rm>11){ry++;rm=0;}
  const ds=`${ry}-${String(rm+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
  const cell=document.createElement('div');
  cell.className='month-cell';
  if(other)cell.classList.add('other-month');
  if(ds===todayKey)cell.classList.add('today');
  if(ds===selectedDay)cell.classList.add('selected');

  const num=document.createElement('div');num.className='cell-num';num.textContent=d;cell.appendChild(num);
  renderCellDots(cell,ds);
  cell.addEventListener('click',()=>openDayDetail(ds,cell));
  return cell;
}

function renderCellDots(cell,ds){
  cell.querySelectorAll('.cell-dots').forEach(el=>el.remove());
  const todos=dailyTodos[ds]||[];
  if(todos.length===0)return;
  const dotsEl=document.createElement('div');dotsEl.className='cell-dots';
  todos.slice(0,6).forEach(t=>{
    const dot=document.createElement('div');dot.className='cell-dot'+(t.done?' done':'');dotsEl.appendChild(dot);
  });
  cell.appendChild(dotsEl);
}

function openDayDetail(ds,cellEl){
  if(selectedDay===ds){closeDayDetail();return;}
  selectedDay=ds;
  document.querySelectorAll('.month-cell.selected').forEach(c=>c.classList.remove('selected'));
  if(cellEl)cellEl.classList.add('selected');

  const panel=document.getElementById('dayDetailPanel');
  panel.classList.add('open');

  const dt=new Date(ds);
  const isToday=ds===todayKey;
  document.getElementById('dayDetailTitle').innerHTML=
    dt.toLocaleDateString('ko-KR',{month:'long',day:'numeric',weekday:'long'})+
    (isToday?' <span class="sub">오늘</span>':'');

  document.getElementById('todoList').innerHTML='<div class="loading-row" style="padding:14px;"><div class="spinner"></div></div>';
  loadTodosForDate(ds).then(()=>renderTodoList(ds));
}

function closeDayDetail(){
  selectedDay=null;
  document.getElementById('dayDetailPanel').classList.remove('open');
  document.querySelectorAll('.month-cell.selected').forEach(c=>c.classList.remove('selected'));
}

async function loadTodosForDate(ds){
  if(dailyTodos[ds])return;
  const {data,error}=await sb.from('daily_todos').select('*').eq('user_id',currentUser.id).eq('date',ds).order('sort_order').order('created_at');
  if(error){console.error(error);dailyTodos[ds]=[];return;}
  dailyTodos[ds]=data||[];
}

function renderTodoList(ds){
  const c=document.getElementById('todoList');c.innerHTML='';
  const todos=dailyTodos[ds]||[];
  if(!todos.length){c.innerHTML=`<div class="todo-empty">아직 할 일이 없어요.<br>위에서 추가해보세요! 📝</div>`;return;}
  todos.forEach(t=>{
    const item=document.createElement('div');item.className='todo-item';
    const chk=document.createElement('button');
    chk.className='todo-check'+(t.done?' done':'');
    chk.textContent='✓';
    chk.addEventListener('click',()=>toggleTodo(t,ds));
    const txt=document.createElement('span');txt.className='todo-text'+(t.done?' done':'');txt.textContent=t.text;
    const del=document.createElement('button');del.className='todo-del';del.textContent='✕';
    del.addEventListener('click',()=>deleteTodo(t,ds));
    item.appendChild(chk);item.appendChild(txt);item.appendChild(del);
    c.appendChild(item);
  });
}

async function addTodo(){
  const input=document.getElementById('todoAddInput');
  const text=input.value.trim();
  if(!text||!selectedDay)return;
  input.value='';
  setSyncState('syncing','저장 중');
  const {data,error}=await sb.from('daily_todos')
    .insert({user_id:currentUser.id,date:selectedDay,text,done:false,sort_order:(dailyTodos[selectedDay]||[]).length})
    .select().single();
  if(error){setSyncState('error','저장 실패');console.error(error);return;}
  if(!dailyTodos[selectedDay])dailyTodos[selectedDay]=[];
  dailyTodos[selectedDay].push(data);
  setSyncState('synced','저장됨');
  renderTodoList(selectedDay);
  // 달력 셀 점 업데이트
  const cell=document.querySelector(`.month-cell.selected`);
  if(cell)renderCellDots(cell,selectedDay);
}

async function toggleTodo(t,ds){
  const {error}=await sb.from('daily_todos').update({done:!t.done}).eq('id',t.id);
  if(error){console.error(error);return;}
  t.done=!t.done;
  renderTodoList(ds);
  const cell=document.querySelector(`.month-cell.selected`);
  if(cell)renderCellDots(cell,ds);
}

async function deleteTodo(t,ds){
  const {error}=await sb.from('daily_todos').delete().eq('id',t.id);
  if(error){console.error(error);return;}
  dailyTodos[ds]=dailyTodos[ds].filter(x=>x.id!==t.id);
  renderTodoList(ds);
  const cell=document.querySelector(`.month-cell.selected`);
  if(cell)renderCellDots(cell,ds);
}

async function onWeeklyOpen(){
  if(!weekDataLoaded)await loadAndRenderWeekly();
}

async function loadAndRenderWeekly(){
  document.getElementById('weeklyTableWrap').innerHTML='<div class="loading-row"><div class="spinner"></div> 불러오는 중...</div>';
  setSyncState('syncing','불러오는 중');

  const mon=getMonday(weeklyDate);
  const days=getWeekDays(mon);
  const dateStrs=days.map(fmtDate);

  const [recRes,blkRes]=await Promise.all([
    sb.from('week_item_records').select('*').eq('user_id',currentUser.id).in('date',dateStrs),
    sb.from('timetable_blocks').select('*').eq('user_id',currentUser.id).in('date',dateStrs),
  ]);

  weekRecords={};
  if(!recRes.error&&recRes.data){
    recRes.data.forEach(r=>{
      if(!weekRecords[r.date])weekRecords[r.date]={};
      weekRecords[r.date][r.item_id]=r.done;
    });
  }
  timeBlocks={};
  if(!blkRes.error&&blkRes.data){
    blkRes.data.forEach(b=>{
      if(!timeBlocks[b.date])timeBlocks[b.date]={};
      timeBlocks[b.date][b.hour]=b;
    });
  }

  setSyncState('synced','동기화됨');
  weekDataLoaded=true;
  renderWeekTable(mon,days,dateStrs);
}

function renderWeekTable(mon,days,dateStrs){
  const wrap=document.getElementById('weeklyTableWrap');
  const lastDay=days[6];
  document.getElementById('weeklyTitle').textContent=
    `${mon.getMonth()+1}/${mon.getDate()} – ${lastDay.getMonth()+1}/${lastDay.getDate()}`;

  const table=document.createElement('table');
  table.className='week-table';

  // ── 헤더 ──
  const thead=document.createElement('thead');
  const hrow=document.createElement('tr');
  const th0=document.createElement('th');th0.className='wth-label';th0.textContent='';hrow.appendChild(th0);
  days.forEach((d,i)=>{
    const th=document.createElement('th');th.className='wth-day';
    if(fmtDate(d)===todayKey)th.classList.add('is-today');
    th.innerHTML=`<div class="wth-day-name">${DAYS_EN[i]}</div><div class="wth-day-date">${d.getMonth()+1}.${d.getDate()}</div>`;
    hrow.appendChild(th);
  });
  thead.appendChild(hrow);
  table.appendChild(thead);

  const tbody=document.createElement('tbody');

  // ── TODO 섹션 ──
  const todoItems=weekItems.filter(it=>it.category==='todo');
  if(todoItems.length){
    addSectionRow(tbody,'TODO',8);
    todoItems.forEach(item=>tbody.appendChild(makeWeekItemRow(item,dateStrs)));
  }

  // ── 습관 섹션 ──
  const habitItems=weekItems.filter(it=>it.category==='habit');
  if(habitItems.length){
    addSectionRow(tbody,'습관',8);
    habitItems.forEach(item=>tbody.appendChild(makeWeekItemRow(item,dateStrs)));
  }

  // ── 타임 테이블 섹션 ──
  addSectionRow(tbody,'타임 테이블',8);
  TIME_HOURS_24.forEach((h24)=>{
    const isMidnight=h24===0;
    const tr=document.createElement('tr');
    if(isMidnight)tr.classList.add('week-midnight-row');

    const hourTd=document.createElement('td');
    hourTd.className='time-hour-cell'+(isMidnight?' midnight-lbl':'');
    hourTd.textContent=dispHour(h24);
    tr.appendChild(hourTd);

    dateStrs.forEach(ds=>{
      tr.appendChild(makeTimeBlockCell(ds,h24));
    });
    tbody.appendChild(tr);
  });

  table.appendChild(tbody);
  wrap.innerHTML='';
  wrap.appendChild(table);

  applyTimeContinuity(dateStrs);
}

function addSectionRow(tbody,label,colspan){
  const tr=document.createElement('tr');tr.className='week-section-hd';
  const td=document.createElement('td');td.colSpan=colspan;td.textContent=label;
  tr.appendChild(td);tbody.appendChild(tr);
}

function makeWeekItemRow(item,dateStrs){
  const tr=document.createElement('tr');
  const lbl=document.createElement('td');lbl.className='week-label-cell';lbl.textContent=item.name;tr.appendChild(lbl);
  dateStrs.forEach(ds=>{
    const done=!!(weekRecords[ds]&&weekRecords[ds][item.id]);
    const td=document.createElement('td');td.className='week-check-cell';
    const btn=document.createElement('button');
    btn.className='week-check-btn'+(done?' done':'');
    btn.textContent='✓';
    btn.dataset.itemId=item.id;btn.dataset.date=ds;
    btn.addEventListener('click',function(){
      const d=this.classList.contains('done');
      toggleWeekRecord(ds,item.id,!d,this);
    });
    td.appendChild(btn);tr.appendChild(td);
  });
  return tr;
}

async function toggleWeekRecord(ds,itemId,done,btnEl){
  if(!weekRecords[ds])weekRecords[ds]={};
  weekRecords[ds][itemId]=done;
  btnEl.classList.toggle('done',done);
  const {error}=await sb.from('week_item_records')
    .upsert({user_id:currentUser.id,date:ds,item_id:itemId,done},{onConflict:'user_id,date,item_id'});
  if(error)console.error(error);
}

function makeTimeBlockCell(ds,h24){
  const td=document.createElement('td');
  td.className='time-block-cell';
  td.dataset.date=ds;td.dataset.hour=h24;

  const block=timeBlocks[ds]&&timeBlocks[ds][h24];
  if(block&&block.color)td.style.backgroundColor=block.color;

  const overlay=document.createElement('div');overlay.className='time-hover-overlay';td.appendChild(overlay);

  const inner=document.createElement('div');inner.className='time-block-inner';
  if(block&&block.label){
    const lbl=document.createElement('div');lbl.className='time-block-label';lbl.textContent=block.label;inner.appendChild(lbl);
  }
  td.appendChild(inner);
  td.addEventListener('click',e=>{e.stopPropagation();openTimePopup(e,ds,h24);});
  return td;
}

function applyTimeContinuity(dateStrs){
  dateStrs.forEach(ds=>{
    const cells=document.querySelectorAll(`td.time-block-cell[data-date="${ds}"]`);
    let prev=null;
    cells.forEach(td=>{
      const h=parseInt(td.dataset.hour);
      const b=timeBlocks[ds]&&timeBlocks[ds][h];
      const color=b?b.color:'';const label=b?b.label:'';
      if(prev&&color&&color===prev.color&&label===prev.label){
        td.classList.add('cont');
      }else{
        td.classList.remove('cont');
      }
      prev={color,label};
    });
  });
}

// ── 타임 팝업 ──
function buildPopupColors(){
  const c=document.getElementById('popupColors');c.innerHTML='';
  const clear=document.createElement('button');
  clear.className='popup-color-btn popup-color-clear';clear.textContent='✕';clear.title='색상 제거';clear.dataset.color='';
  clear.addEventListener('click',()=>selectColor('',clear));c.appendChild(clear);
  BLOCK_COLORS.forEach(bc=>{
    const btn=document.createElement('button');
    btn.className='popup-color-btn';btn.style.background=bc.value;btn.title=bc.name;btn.dataset.color=bc.value;
    btn.addEventListener('click',()=>selectColor(bc.value,btn));c.appendChild(btn);
  });
}

function selectColor(color,btnEl){
  popupCtx.color=color;
  document.querySelectorAll('.popup-color-btn').forEach(b=>b.classList.remove('selected'));
  btnEl.classList.add('selected');
}

function openTimePopup(e,ds,h24){
  popupCtx.date=ds;popupCtx.hour=h24;
  const block=timeBlocks[ds]&&timeBlocks[ds][h24];
  document.getElementById('popupLabelInput').value=block?block.label||'':'';
  popupCtx.color=block?block.color||'':'';
  document.querySelectorAll('.popup-color-btn').forEach(b=>b.classList.toggle('selected',b.dataset.color===popupCtx.color));

  const label=`${dispHour(h24)}:00`;
  document.getElementById('popupTimeLabel').textContent=`${ds} · ${label}`;

  const popup=document.getElementById('timePopup');
  popup.classList.remove('hidden');
  const pw=220,ph=160;
  let x=e.clientX+10,y=e.clientY+10;
  if(x+pw>window.innerWidth-8)x=e.clientX-pw-10;
  if(y+ph>window.innerHeight-8)y=e.clientY-ph-10;
  popup.style.left=x+'px';popup.style.top=y+'px';
  setTimeout(()=>document.getElementById('popupLabelInput').select(),40);
}

function closePopup(){
  document.getElementById('timePopup').classList.add('hidden');
  popupCtx={date:null,hour:null,color:''};
}

async function confirmPopup(){
  const label=document.getElementById('popupLabelInput').value.trim();
  const {date,hour,color}=popupCtx;
  if(!date||hour===null){closePopup();return;}
  closePopup();

  if(!label&&!color){
    await clearTimeBlock(date,hour);
  }else{
    await saveTimeBlock(date,hour,label,color);
  }
  updateTimeCellUI(date,hour);

  const mon=getMonday(weeklyDate);
  const dateStrs=getWeekDays(mon).map(fmtDate);
  applyTimeContinuity(dateStrs);
}

async function saveTimeBlock(ds,hour,label,color){
  if(!timeBlocks[ds])timeBlocks[ds]={};
  timeBlocks[ds][hour]={...(timeBlocks[ds][hour]||{}),label,color};
  const {error}=await sb.from('timetable_blocks')
    .upsert({user_id:currentUser.id,date:ds,hour,label:label||null,color:color||null},{onConflict:'user_id,date,hour'});
  if(error)console.error(error);
}

async function clearTimeBlock(ds,hour){
  if(timeBlocks[ds])delete timeBlocks[ds][hour];
  await sb.from('timetable_blocks').delete().eq('user_id',currentUser.id).eq('date',ds).eq('hour',hour);
}

function updateTimeCellUI(ds,hour){
  const td=document.querySelector(`td.time-block-cell[data-date="${ds}"][data-hour="${hour}"]`);
  if(!td)return;
  const b=timeBlocks[ds]&&timeBlocks[ds][hour];
  td.style.backgroundColor=b&&b.color?b.color:'';
  const inner=td.querySelector('.time-block-inner');
  inner.innerHTML='';
  if(b&&b.label){
    const lbl=document.createElement('div');lbl.className='time-block-label';lbl.textContent=b.label;inner.appendChild(lbl);
  }
}

// ── 주간 항목 설정 ──
async function loadWeekItems(){
  const {data,error}=await sb.from('week_items').select('*').eq('user_id',currentUser.id).order('sort_order');
  if(error){console.error(error);return;}
  if(!data||!data.length){await seedDefaultWeekItems();}else weekItems=data;
}

async function seedDefaultWeekItems(){
  const rows=[
    ...DEFAULT_TODO_ITEMS.map((name,i)=>({user_id:currentUser.id,category:'todo',name,sort_order:i})),
    ...DEFAULT_HABIT_ITEMS.map((name,i)=>({user_id:currentUser.id,category:'habit',name,sort_order:i})),
  ];
  const {data,error}=await sb.from('week_items').insert(rows).select();
  if(error){console.error(error);return;}
  weekItems=data||[];
}

function openWeekSettings(){
  renderWeekSettingsModal();
  document.getElementById('weekSettingsModal').classList.remove('hidden');
}
function closeWeekSettings(){document.getElementById('weekSettingsModal').classList.add('hidden');}

function renderWeekSettingsModal(){
  const tl=document.getElementById('todoItemsList'),hl=document.getElementById('habitItemsList');
  tl.innerHTML='';hl.innerHTML='';
  weekItems.forEach((item,idx)=>{
    const row=document.createElement('div');row.className='modal-item-row';row.dataset.idx=idx;
    const inp=document.createElement('input');inp.type='text';inp.className='modal-item-input';inp.value=item.name;
    const del=document.createElement('button');del.className='modal-item-del';del.textContent='✕';
    del.addEventListener('click',()=>{weekItems.splice(idx,1);renderWeekSettingsModal();});
    row.appendChild(inp);row.appendChild(del);
    (item.category==='todo'?tl:hl).appendChild(row);
  });
}

function modalAddItem(cat){
  const id=cat==='todo'?'todoNewName':'habitNewName';
  const inp=document.getElementById(id);const name=inp.value.trim();
  if(!name)return;
  weekItems.push({id:null,user_id:currentUser.id,category:cat,name,sort_order:weekItems.filter(x=>x.category===cat).length});
  inp.value='';renderWeekSettingsModal();
}

async function saveWeekItems(){
  const btn=document.getElementById('weekModalSaveBtn');btn.disabled=true;btn.textContent='저장 중...';
  const tRows=document.querySelectorAll('#todoItemsList .modal-item-row');
  const hRows=document.querySelectorAll('#habitItemsList .modal-item-row');
  const updated=[];
  [[tRows,'todo'],[hRows,'habit']].forEach(([rows,cat])=>{
    rows.forEach((row,i)=>{
      const idx=parseInt(row.dataset.idx);
      const item=weekItems[idx]||{};
      const name=row.querySelector('.modal-item-input').value.trim();
      if(name)updated.push({id:item.id||undefined,user_id:currentUser.id,category:cat,name,sort_order:i});
    });
  });
  const keptIds=new Set(updated.filter(u=>u.id).map(u=>u.id));
  const toDel=weekItems.filter(it=>it.id&&!keptIds.has(it.id)).map(it=>it.id);
  if(toDel.length)await sb.from('week_items').delete().in('id',toDel);
  const toUpsert=updated.map(u=>{const r={...u};if(!r.id)delete r.id;return r;});
  const {data,error}=await sb.from('week_items').upsert(toUpsert,{onConflict:'id'}).select();
  if(error){console.error(error);btn.disabled=false;btn.textContent='저장';return;}
  weekItems=(data||[]).sort((a,b)=>a.sort_order-b.sort_order);
  weekDataLoaded=false;btn.disabled=false;btn.textContent='저장';
  closeWeekSettings();
  await loadAndRenderWeekly();
}

// ══════════════════════════════════════════════
// ── 일간 뷰 ──
// ══════════════════════════════════════════════
function renderDailyView(){
  const ds=fmtDate(dailyDate);
  const isToday=ds===todayKey;
  document.getElementById('dailyTitle').textContent=
    isToday?'오늘':dailyDate.toLocaleDateString('ko-KR',{month:'long',day:'numeric',weekday:'long'});
  document.getElementById('diaryDateLabel').textContent=
    dailyDate.toLocaleDateString('ko-KR',{year:'numeric',month:'long',day:'numeric',weekday:'long'});

  const ta=document.getElementById('diaryTextarea');
  document.getElementById('diaryStatus').textContent='';

  if(diaryEntries[ds]!==undefined){
    ta.value=diaryEntries[ds].content||'';
  }else{
    ta.value='';
    loadDiaryEntry(ds).then(()=>{
      if(fmtDate(dailyDate)===ds){
        ta.value=diaryEntries[ds]?diaryEntries[ds].content||'':'';
      }
    });
  }

  ta.oninput=()=>{
    clearTimeout(diaryDebounce);
    diaryDebounce=setTimeout(()=>saveDiary(true),1500);
  };
}

async function loadDiaryEntry(ds){
  if(diaryEntries[ds]!==undefined)return;
  const {data,error}=await sb.from('diary_entries')
    .select('*').eq('user_id',currentUser.id).eq('date',ds).maybeSingle();
  if(error){console.error(error);diaryEntries[ds]={content:''};return;}
  diaryEntries[ds]=data||{content:''};
}

async function saveDiary(auto=false){
  const ds=fmtDate(dailyDate);
  const content=document.getElementById('diaryTextarea').value;
  const status=document.getElementById('diaryStatus');
  if(!auto)setSyncState('syncing','저장 중');
  const {data,error}=await sb.from('diary_entries')
    .upsert({user_id:currentUser.id,date:ds,content},{onConflict:'user_id,date'})
    .select().maybeSingle();
  if(error){console.error(error);if(!auto)setSyncState('error','저장 실패');return;}
  diaryEntries[ds]=data||{content};
  status.textContent='저장됐습니다 ✓';
  if(!auto)setSyncState('synced','저장됨');
  setTimeout(()=>status.textContent='',2500);
}
</script>

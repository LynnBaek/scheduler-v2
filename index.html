<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>my//planner</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
:root {
  --bg:#0e0e12; --surface:#16161e; --surface2:#1e1e2a;
  --border:#2a2a3a; --accent:#7c6af7; --accent2:#f26abe;
  --accent3:#4ecdc4; --text:#e8e8f0; --text-dim:#7a7a9a;
  --red:#f26a6a; --yellow:#f2c86a; --green:#6af2a0; --gold:#f2d06a;
}
*{margin:0;padding:0;box-sizing:border-box;}
body{background:var(--bg);color:var(--text);font-family:'Noto Sans KR',sans-serif;min-height:100vh;display:flex;flex-direction:column;}

/* ── AUTH ── */
#authScreen{position:fixed;inset:0;background:var(--bg);display:flex;align-items:center;justify-content:center;z-index:9999;}
.auth-box{background:var(--surface);border:1px solid var(--border);border-radius:16px;padding:40px 36px;width:100%;max-width:380px;display:flex;flex-direction:column;gap:14px;text-align:center;}
.auth-logo{font-family:'DM Mono',monospace;font-size:1.3rem;color:var(--accent);}
.auth-logo span{color:var(--accent2);}
.auth-tabs{display:flex;border:1px solid var(--border);border-radius:10px;overflow:hidden;}
.auth-tab{flex:1;padding:9px;background:none;border:none;color:var(--text-dim);font-family:'Noto Sans KR',sans-serif;font-size:0.85rem;cursor:pointer;transition:all 0.15s;}
.auth-tab.active{background:var(--accent);color:white;}
.auth-field{display:flex;flex-direction:column;gap:5px;text-align:left;}
.auth-label{font-size:0.75rem;color:var(--text-dim);}
.auth-input{width:100%;background:var(--surface2);border:1px solid var(--border);border-radius:10px;padding:11px 14px;color:var(--text);font-family:'Noto Sans KR',sans-serif;font-size:0.9rem;outline:none;transition:border-color 0.15s;}
.auth-input:focus{border-color:var(--accent);}
.auth-btn{background:var(--accent);border:none;border-radius:10px;padding:12px;color:white;font-family:'Noto Sans KR',sans-serif;font-size:0.95rem;font-weight:500;cursor:pointer;transition:background 0.15s;margin-top:4px;}
.auth-btn:hover{background:#6a58e0;}
.auth-btn:disabled{opacity:0.5;cursor:not-allowed;}
.auth-msg{font-size:0.78rem;min-height:18px;}
.auth-msg.err{color:var(--red);}
.auth-msg.ok{color:var(--green);}
@keyframes shake{0%,100%{transform:translateX(0)}25%{transform:translateX(-6px)}75%{transform:translateX(6px)}}

/* ── HEADER ── */
header{padding:12px 24px;display:flex;align-items:center;justify-content:space-between;border-bottom:1px solid var(--border);background:var(--surface);position:sticky;top:0;z-index:100;gap:16px;}
.logo{font-family:'DM Mono',monospace;font-size:1.05rem;color:var(--accent);flex-shrink:0;}
.logo span{color:var(--accent2);}
.nav-tabs{display:flex;gap:3px;background:var(--surface2);border:1px solid var(--border);border-radius:12px;padding:4px;}
.nav-tab{padding:7px 20px;background:none;border:none;border-radius:8px;color:var(--text-dim);font-family:'Noto Sans KR',sans-serif;font-size:0.85rem;font-weight:500;cursor:pointer;transition:all 0.15s;white-space:nowrap;}
.nav-tab:hover{color:var(--text);}
.nav-tab.active{background:var(--accent);color:white;}
.header-right{display:flex;align-items:center;gap:10px;flex-shrink:0;}
.today-badge{font-family:'DM Mono',monospace;font-size:0.73rem;color:var(--text-dim);background:var(--surface2);border:1px solid var(--border);padding:4px 10px;border-radius:20px;}
.sync-indicator{font-family:'DM Mono',monospace;font-size:0.7rem;padding:4px 10px;border-radius:20px;border:1px solid var(--border);display:flex;align-items:center;gap:5px;transition:all 0.3s;}
.sync-indicator.syncing{color:var(--yellow);border-color:var(--yellow);}
.sync-indicator.synced{color:var(--green);border-color:var(--green);}
.sync-indicator.error{color:var(--red);border-color:var(--red);}
.sync-dot{width:6px;height:6px;border-radius:50%;background:currentColor;}
.syncing .sync-dot{animation:blink 0.8s infinite;}
@keyframes blink{0%,100%{opacity:1}50%{opacity:0.2}}
.logout-btn{background:none;border:1px solid var(--border);border-radius:8px;padding:5px 12px;color:var(--text-dim);font-size:0.78rem;cursor:pointer;font-family:'Noto Sans KR',sans-serif;transition:all 0.15s;}
.logout-btn:hover{border-color:var(--red);color:var(--red);}

/* ── LAYOUT ── */
main{flex:1;display:grid;grid-template-columns:252px 1fr;height:calc(100vh - 55px);overflow:hidden;}

/* ── CALENDAR SIDEBAR ── */
aside{background:var(--surface);border-right:1px solid var(--border);padding:18px;display:flex;flex-direction:column;gap:18px;overflow-y:auto;}
.cal-nav{display:flex;align-items:center;justify-content:space-between;}
.cal-nav button{background:none;border:1px solid var(--border);color:var(--text-dim);width:27px;height:27px;border-radius:6px;cursor:pointer;font-size:0.85rem;display:flex;align-items:center;justify-content:center;transition:all 0.15s;}
.cal-nav button:hover{border-color:var(--accent);color:var(--accent);}
.cal-month{font-weight:500;font-size:0.88rem;}
.cal-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:2px;}
.cal-day-label{text-align:center;font-family:'DM Mono',monospace;font-size:0.62rem;color:var(--text-dim);padding:4px 0 6px;}
.cal-cell{aspect-ratio:1;display:flex;align-items:center;justify-content:center;border-radius:6px;font-size:0.74rem;cursor:pointer;transition:all 0.15s;position:relative;color:var(--text-dim);font-family:'DM Mono',monospace;}
.cal-cell:hover{background:var(--surface2);color:var(--text);}
.cal-cell.today{color:var(--accent);font-weight:700;}
.cal-cell.today::after{content:'';position:absolute;bottom:2px;width:4px;height:4px;border-radius:50%;background:var(--accent);}
.cal-cell.selected{background:var(--accent);color:white;}
.cal-cell.selected::after{display:none;}
.cal-cell.has-data::before{content:'';position:absolute;top:2px;right:2px;width:4px;height:4px;border-radius:50%;background:var(--accent2);}
.cal-cell.selected.has-data::before{background:white;}
.cal-cell.other-month{opacity:0.3;}

/* ── TAB CONTENT ── */
.content{display:flex;flex-direction:column;overflow:hidden;}
.tab-pane{flex:1;display:none;flex-direction:column;overflow:hidden;}
.tab-pane.active{display:flex;}

/* ── DATE NAV BAR ── */
.date-nav-bar{padding:12px 24px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;flex-shrink:0;background:var(--surface);}
.date-nav-label{font-size:1rem;font-weight:500;}
.date-nav-label .sub{font-family:'DM Mono',monospace;font-size:0.73rem;color:var(--text-dim);margin-left:8px;}
.date-nav-btns{display:flex;gap:6px;}
.date-nav-btn{background:none;border:1px solid var(--border);border-radius:8px;padding:4px 12px;color:var(--text-dim);font-size:0.82rem;cursor:pointer;transition:all 0.15s;}
.date-nav-btn:hover{border-color:var(--accent);color:var(--accent);}
.date-today-btn{font-size:0.78rem;color:var(--accent);background:rgba(124,106,247,0.1);border:1px solid rgba(124,106,247,0.3);border-radius:8px;padding:4px 12px;cursor:pointer;transition:all 0.15s;}
.date-today-btn:hover{background:rgba(124,106,247,0.2);}

/* ── SAVE BAR ── */
.save-bar{padding:8px 24px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;flex-shrink:0;background:var(--surface2);}
.save-status{font-size:0.73rem;color:var(--text-dim);font-family:'DM Mono',monospace;}
.save-btn{background:var(--accent);border:none;border-radius:8px;padding:6px 18px;color:white;font-family:'Noto Sans KR',sans-serif;font-size:0.82rem;font-weight:500;cursor:pointer;transition:all 0.15s;}
.save-btn:hover{background:#6a58e0;}
.save-btn:disabled{opacity:0.5;cursor:not-allowed;}

/* ── GOALS TAB ── */
.goals-layout{flex:1;display:grid;grid-template-columns:1fr 300px;overflow:hidden;}
.goals-main{overflow-y:auto;}
.goals-main::-webkit-scrollbar{width:4px;}
.goals-main::-webkit-scrollbar-thumb{background:var(--border);border-radius:2px;}
.goals-sidebar{border-left:1px solid var(--border);overflow-y:auto;padding:18px;display:flex;flex-direction:column;gap:14px;}
.goals-sidebar::-webkit-scrollbar{width:4px;}
.goals-sidebar::-webkit-scrollbar-thumb{background:var(--border);border-radius:2px;}

.goal-row-header{display:grid;grid-template-columns:1fr 34px 150px 150px;gap:8px;padding:6px 20px;background:var(--surface);border-bottom:1px solid var(--border);position:sticky;top:0;z-index:5;}
.col-lbl{font-size:0.66rem;color:var(--text-dim);font-family:'DM Mono',monospace;}
.goal-group{border-bottom:1px solid var(--border);}
.goal-group-hd{padding:8px 20px;background:var(--surface2);font-size:0.75rem;font-weight:500;color:var(--text-dim);letter-spacing:0.04em;display:flex;align-items:center;justify-content:space-between;cursor:pointer;user-select:none;transition:color 0.15s;}
.goal-group-hd:hover{color:var(--text);}
.goal-group-toggle{font-size:0.68rem;transition:transform 0.2s;}
.goal-group.collapsed .goal-group-toggle{transform:rotate(-90deg);}
.goal-group.collapsed .goal-group-body{display:none;}
.goal-row{display:grid;grid-template-columns:1fr 34px 150px 150px;align-items:center;gap:8px;padding:7px 20px;border-bottom:1px solid rgba(42,42,58,0.5);transition:background 0.1s;}
.goal-row:last-child{border-bottom:none;}
.goal-row:hover{background:var(--surface2);}
.goal-cat-name{font-size:0.84rem;}
.star-btn{background:none;border:none;cursor:pointer;font-size:1rem;color:var(--border);transition:all 0.15s;padding:0;line-height:1;}
.star-btn.on{color:var(--yellow);}
.star-btn:hover{color:var(--yellow);}
.goal-input{background:var(--surface2);border:1px solid var(--border);border-radius:8px;padding:5px 9px;color:var(--text);font-family:'Noto Sans KR',sans-serif;font-size:0.8rem;outline:none;width:100%;transition:border-color 0.15s;}
.goal-input:focus{border-color:var(--accent);}
.goal-input.actual:focus{border-color:var(--green);}
.goal-input::placeholder{color:var(--text-dim);}

/* ── KR SIDEBAR ── */
.kr-header{display:flex;align-items:center;justify-content:space-between;gap:6px;}
.kr-title{font-size:0.84rem;font-weight:500;}
.kr-month{font-family:'DM Mono',monospace;font-size:0.7rem;color:var(--accent);}
.kr-add{background:none;border:1px solid var(--border);border-radius:6px;padding:3px 10px;font-size:0.7rem;color:var(--text-dim);cursor:pointer;transition:all 0.15s;font-family:'Noto Sans KR',sans-serif;}
.kr-add:hover{border-color:var(--accent);color:var(--accent);}
.kr-item{background:var(--surface2);border:1px solid var(--border);border-radius:10px;padding:11px 13px;display:flex;flex-direction:column;gap:6px;transition:border-color 0.15s;}
.kr-item:hover{border-color:var(--accent);}
.kr-item-top{display:flex;align-items:center;gap:6px;}
.kr-name{font-size:0.8rem;font-weight:500;flex:1;}
.kr-vals{display:flex;align-items:center;gap:4px;font-family:'DM Mono',monospace;font-size:0.7rem;}
.kr-actual{color:var(--green);font-weight:500;cursor:pointer;}
.kr-actual:hover{text-decoration:underline;}
.kr-sep{color:var(--text-dim);}
.kr-pct{color:var(--accent);font-weight:500;margin-left:auto;}
.kr-track{height:5px;background:var(--border);border-radius:3px;overflow:hidden;}
.kr-fill{height:100%;background:var(--accent);border-radius:3px;transition:width 0.4s ease;}
.kr-fill.done{background:var(--green);}
.kr-del{background:none;border:none;color:var(--text-dim);cursor:pointer;font-size:0.65rem;padding:2px 5px;border-radius:4px;transition:color 0.15s;flex-shrink:0;}
.kr-del:hover{color:var(--red);}
.kr-empty{font-size:0.78rem;color:var(--text-dim);text-align:center;padding:20px;line-height:1.7;}

/* ── TIME TAB ── */
.time-layout{flex:1;display:grid;grid-template-columns:1fr 260px;overflow:hidden;}
.time-main{overflow-y:auto;}
.time-main::-webkit-scrollbar{width:4px;}
.time-main::-webkit-scrollbar-thumb{background:var(--border);border-radius:2px;}
.time-sidebar{border-left:1px solid var(--border);overflow-y:auto;padding:18px;display:flex;flex-direction:column;gap:14px;}
.time-sidebar::-webkit-scrollbar{width:4px;}
.time-sidebar::-webkit-scrollbar-thumb{background:var(--border);border-radius:2px;}
.time-summary-bar{padding:10px 24px;background:var(--surface2);border-bottom:1px solid var(--border);display:flex;align-items:center;gap:12px;flex-shrink:0;flex-wrap:wrap;}
.time-chip{font-family:'DM Mono',monospace;font-size:0.78rem;padding:3px 11px;border-radius:20px;border:1px solid var(--border);}
.time-chip.good{border-color:var(--green);color:var(--green);}
.time-chip.warn{border-color:var(--yellow);color:var(--yellow);}
.time-chip.dim{border-color:var(--border);color:var(--text-dim);}
.time-row-header{display:grid;grid-template-columns:1fr 80px 80px 54px;gap:8px;padding:5px 20px;background:var(--surface);border-bottom:1px solid var(--border);position:sticky;top:0;z-index:5;}
.time-group{border-bottom:1px solid var(--border);}
.time-group-hd{padding:8px 20px;background:var(--surface2);font-size:0.75rem;font-weight:500;display:flex;align-items:center;justify-content:space-between;cursor:pointer;user-select:none;transition:color 0.15s;}
.time-group-hd:hover{color:var(--text-dim);}
.time-group-sum{font-family:'DM Mono',monospace;font-size:0.7rem;color:var(--accent3);display:flex;align-items:center;gap:8px;}
.time-group.collapsed .time-group-body{display:none;}
.time-row{display:grid;grid-template-columns:1fr 80px 80px 54px;align-items:center;gap:8px;padding:7px 20px;border-bottom:1px solid rgba(42,42,58,0.5);transition:background 0.1s;}
.time-row:last-child{border-bottom:none;}
.time-row:hover{background:var(--surface2);}
.time-cat{font-size:0.84rem;}
.time-input{background:var(--surface2);border:1px solid var(--border);border-radius:8px;padding:5px 8px;color:var(--text);font-family:'DM Mono',monospace;font-size:0.8rem;outline:none;width:100%;text-align:center;transition:border-color 0.15s;}
.time-input:focus{border-color:var(--accent3);}
.time-diff{font-family:'DM Mono',monospace;font-size:0.7rem;text-align:center;}
.time-diff.pos{color:var(--green);}
.time-diff.neg{color:var(--red);}
.time-diff.zero{color:var(--text-dim);}
.chart-title{font-size:0.8rem;font-weight:500;color:var(--text-dim);margin-bottom:10px;}
.bar-chart{display:flex;flex-direction:column;gap:9px;}
.bar-row{display:flex;align-items:center;gap:8px;}
.bar-lbl{font-size:0.7rem;color:var(--text-dim);width:34px;flex-shrink:0;text-align:right;font-family:'DM Mono',monospace;}
.bar-track{flex:1;height:20px;background:var(--surface2);border-radius:4px;overflow:hidden;}
.bar-fill{height:100%;border-radius:4px;display:flex;align-items:center;padding-left:6px;min-width:2px;transition:width 0.4s ease;}
.bar-fill-txt{font-size:0.63rem;color:white;font-family:'DM Mono',monospace;opacity:0.9;white-space:nowrap;}
.bar-val{font-family:'DM Mono',monospace;font-size:0.68rem;color:var(--text-dim);width:38px;flex-shrink:0;}

/* ── GRATITUDE TAB ── */
.grat-wrap{flex:1;overflow-y:auto;display:flex;justify-content:center;padding:24px;}
.grat-wrap::-webkit-scrollbar{width:4px;}
.grat-wrap::-webkit-scrollbar-thumb{background:var(--border);border-radius:2px;}
.grat-inner{width:100%;max-width:600px;display:flex;flex-direction:column;gap:16px;}
.grat-date-full{font-family:'DM Mono',monospace;font-size:0.7rem;color:var(--gold);}
.grat-add{display:flex;gap:8px;}
.grat-input{flex:1;background:var(--surface2);border:1px solid var(--border);border-radius:10px;padding:10px 14px;color:var(--text);font-family:'Noto Sans KR',sans-serif;font-size:0.9rem;outline:none;transition:border-color 0.15s;}
.grat-input:focus{border-color:var(--gold);}
.grat-input::placeholder{color:var(--text-dim);}
.grat-add-btn{background:var(--gold);border:none;border-radius:10px;padding:10px 16px;color:#1a1200;font-size:1rem;font-weight:700;cursor:pointer;transition:all 0.15s;flex-shrink:0;}
.grat-add-btn:hover{background:#e8be50;transform:translateY(-1px);}
.grat-add-btn:disabled{opacity:0.5;cursor:not-allowed;transform:none;}
.grat-items{display:flex;flex-direction:column;gap:10px;}
.grat-item{background:var(--surface);border:1px solid var(--border);border-left:3px solid var(--gold);border-radius:10px;padding:12px 14px;display:flex;align-items:flex-start;gap:10px;animation:slideIn 0.2s ease;transition:border-color 0.15s;}
.grat-item:hover{border-color:var(--gold);}
.grat-emoji{font-size:1.1rem;flex-shrink:0;line-height:1;margin-top:1px;}
.grat-text{flex:1;font-size:0.87rem;line-height:1.5;}
.grat-del{background:none;border:none;color:var(--text-dim);cursor:pointer;font-size:0.75rem;opacity:0;transition:all 0.15s;padding:2px 4px;}
.grat-item:hover .grat-del{opacity:1;}
.grat-del:hover{color:var(--red);}
.grat-empty{display:flex;flex-direction:column;align-items:center;justify-content:center;gap:10px;color:var(--text-dim);padding:40px;text-align:center;}
.grat-empty .icon{font-size:3rem;opacity:0.3;}
.grat-empty p{font-size:0.84rem;line-height:1.6;}
.streak-box{background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:16px;display:flex;align-items:center;gap:14px;}
.streak-icon{font-size:1.6rem;}
.streak-info{flex:1;}
.streak-lbl{font-size:0.73rem;color:var(--text-dim);}
.streak-num{font-family:'DM Mono',monospace;font-size:1.7rem;color:var(--gold);font-weight:500;line-height:1.1;}

/* ── MONTHLY TAB ── */
.monthly-top-bar{padding:10px 20px;border-bottom:1px solid var(--border);background:var(--surface);display:flex;align-items:center;justify-content:space-between;flex-shrink:0;gap:12px;}
.monthly-month-nav{display:flex;align-items:center;gap:8px;}
.monthly-month-nav button{background:none;border:1px solid var(--border);color:var(--text-dim);width:28px;height:28px;border-radius:6px;cursor:pointer;font-size:0.85rem;display:flex;align-items:center;justify-content:center;transition:all 0.15s;}
.monthly-month-nav button:hover{border-color:var(--accent);color:var(--accent);}
.monthly-month-label{font-size:0.95rem;font-weight:500;min-width:90px;text-align:center;}
.monthly-top-actions{display:flex;gap:8px;}
.monthly-settings-btn{background:none;border:1px solid var(--border);border-radius:8px;padding:5px 14px;color:var(--text-dim);font-size:0.78rem;cursor:pointer;transition:all 0.15s;font-family:'Noto Sans KR',sans-serif;}
.monthly-settings-btn:hover{border-color:var(--accent);color:var(--accent);}
.monthly-today-btn{font-size:0.78rem;color:var(--accent);background:rgba(124,106,247,0.1);border:1px solid rgba(124,106,247,0.3);border-radius:8px;padding:5px 14px;cursor:pointer;transition:all 0.15s;}
.monthly-today-btn:hover{background:rgba(124,106,247,0.2);}

/* ── CALENDAR LAYOUT ── */
.monthly-layout{flex:1;display:grid;grid-template-columns:1fr 270px;overflow:hidden;}
.monthly-cal-area{overflow-y:auto;padding:16px 16px 24px;}
.monthly-cal-area::-webkit-scrollbar{width:4px;}
.monthly-cal-area::-webkit-scrollbar-thumb{background:var(--border);border-radius:2px;}

.monthly-cal-header{display:grid;grid-template-columns:repeat(7,1fr);gap:6px;margin-bottom:6px;}
.monthly-cal-dow{text-align:center;font-family:'DM Mono',monospace;font-size:0.68rem;color:var(--text-dim);padding:4px 0;}
.monthly-cal-dow.sun{color:var(--red);}
.monthly-cal-dow.sat{color:#6ab4f2;}

.monthly-cal-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:6px;}

/* day cell */
.monthly-day-cell{min-height:100px;background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:7px 8px 6px;cursor:pointer;transition:border-color 0.15s,background 0.15s;display:flex;flex-direction:column;gap:3px;overflow:hidden;}
.monthly-day-cell:hover{border-color:rgba(124,106,247,0.5);}
.monthly-day-cell.other-month{opacity:0.28;pointer-events:none;}
.monthly-day-cell.today{border-color:var(--accent);}
.monthly-day-cell.cal-selected{background:rgba(124,106,247,0.1);border-color:var(--accent);}
.monthly-day-cell.sun .monthly-day-num{color:var(--red);}
.monthly-day-cell.sat .monthly-day-num{color:#6ab4f2;}

.monthly-day-num{font-family:'DM Mono',monospace;font-size:0.8rem;color:var(--text-dim);font-weight:500;flex-shrink:0;}
.monthly-day-cell.today .monthly-day-num{color:var(--accent);font-weight:700;}
.monthly-day-cell.cal-selected .monthly-day-num{color:var(--accent);}

.monthly-chip{font-size:0.62rem;border-radius:4px;padding:2px 6px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;line-height:1.4;flex-shrink:0;}

/* day detail panel */
.monthly-day-panel{border-left:1px solid var(--border);overflow-y:auto;display:flex;flex-direction:column;background:var(--surface);}
.monthly-day-panel::-webkit-scrollbar{width:4px;}
.monthly-day-panel::-webkit-scrollbar-thumb{background:var(--border);border-radius:2px;}
.day-panel-header{padding:14px 18px 10px;border-bottom:1px solid var(--border);flex-shrink:0;}
.day-panel-date{font-size:0.95rem;font-weight:500;}
.day-panel-weekday{font-family:'DM Mono',monospace;font-size:0.7rem;color:var(--text-dim);margin-top:2px;}
.day-panel-items{padding:14px 16px;display:flex;flex-direction:column;gap:12px;flex:1;}
.day-panel-item{display:flex;flex-direction:column;gap:5px;}
.day-panel-label{font-size:0.72rem;color:var(--text-dim);display:flex;align-items:center;gap:5px;}
.day-panel-dot{width:7px;height:7px;border-radius:50%;flex-shrink:0;}
.day-panel-input{background:var(--surface2);border:1px solid var(--border);border-radius:8px;padding:6px 10px;color:var(--text);font-family:'Noto Sans KR',sans-serif;font-size:0.82rem;outline:none;width:100%;resize:none;line-height:1.4;transition:border-color 0.15s;}
.day-panel-input:focus{border-color:var(--accent);}
.day-panel-empty{flex:1;display:flex;align-items:center;justify-content:center;color:var(--text-dim);font-size:0.82rem;padding:40px 20px;text-align:center;line-height:1.7;}

/* ── MONTHLY SETTINGS MODAL ── */
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,0.6);z-index:500;display:flex;align-items:center;justify-content:center;}
.modal-overlay.hidden{display:none;}
.modal-box{background:var(--surface);border:1px solid var(--border);border-radius:16px;padding:28px;width:100%;max-width:440px;max-height:80vh;overflow-y:auto;display:flex;flex-direction:column;gap:16px;}
.modal-box::-webkit-scrollbar{width:4px;}
.modal-box::-webkit-scrollbar-thumb{background:var(--border);border-radius:2px;}
.modal-title{font-size:1rem;font-weight:500;display:flex;align-items:center;justify-content:space-between;}
.modal-close{background:none;border:none;color:var(--text-dim);font-size:1.1rem;cursor:pointer;padding:2px 6px;border-radius:4px;transition:color 0.15s;}
.modal-close:hover{color:var(--red);}
.modal-items-list{display:flex;flex-direction:column;gap:8px;}
.modal-item-row{display:flex;align-items:center;gap:8px;background:var(--surface2);border:1px solid var(--border);border-radius:10px;padding:8px 12px;}
.modal-item-color{width:18px;height:18px;border-radius:50%;border:2px solid rgba(255,255,255,0.2);cursor:pointer;flex-shrink:0;}
.modal-item-name{flex:1;background:transparent;border:none;outline:none;color:var(--text);font-family:'Noto Sans KR',sans-serif;font-size:0.85rem;}
.modal-item-cat{width:120px;background:var(--surface);border:1px solid var(--border);border-radius:6px;padding:3px 6px;color:var(--text-dim);font-size:0.72rem;font-family:'Noto Sans KR',sans-serif;outline:none;}
.modal-item-cat:focus{border-color:var(--accent);}
.modal-item-del{background:none;border:none;color:var(--text-dim);cursor:pointer;font-size:0.8rem;padding:2px 5px;border-radius:4px;transition:color 0.15s;flex-shrink:0;}
.modal-item-del:hover{color:var(--red);}
.modal-add-row{display:flex;gap:8px;}
.modal-add-input{flex:1;background:var(--surface2);border:1px solid var(--border);border-radius:8px;padding:8px 12px;color:var(--text);font-family:'Noto Sans KR',sans-serif;font-size:0.85rem;outline:none;}
.modal-add-input:focus{border-color:var(--accent);}
.modal-add-btn{background:var(--accent);border:none;border-radius:8px;padding:8px 16px;color:white;font-size:0.82rem;cursor:pointer;font-family:'Noto Sans KR',sans-serif;transition:background 0.15s;}
.modal-add-btn:hover{background:#6a58e0;}
.modal-save-btn{background:var(--accent);border:none;border-radius:10px;padding:10px;color:white;font-family:'Noto Sans KR',sans-serif;font-size:0.9rem;font-weight:500;cursor:pointer;transition:background 0.15s;}
.modal-save-btn:hover{background:#6a58e0;}

/* ── STATUS DROPDOWN ── */
.status-wrap{position:relative;width:100%;}
.status-btn{display:flex;align-items:center;gap:6px;background:var(--surface2);border:1px solid var(--border);border-radius:8px;padding:5px 8px;cursor:pointer;width:100%;outline:none;transition:border-color 0.15s;font-family:'Noto Sans KR',sans-serif;}
.status-btn:hover{border-color:var(--accent);}
.status-sq{width:10px;height:10px;border-radius:3px;flex-shrink:0;}
.status-lbl{font-size:0.78rem;flex:1;text-align:left;color:var(--text);}
.status-lbl.dim{color:var(--text-dim);}
.status-arrow{font-size:0.6rem;color:var(--text-dim);}
.status-menu{position:absolute;right:0;top:calc(100% + 4px);background:var(--surface);border:1px solid var(--border);border-radius:10px;overflow:hidden;z-index:200;box-shadow:0 8px 24px rgba(0,0,0,0.5);min-width:110px;}
.status-menu.hidden{display:none;}
.status-opt{padding:8px 14px;cursor:pointer;font-size:0.82rem;display:flex;align-items:center;gap:8px;transition:background 0.1s;font-family:'Noto Sans KR',sans-serif;}
.status-opt:hover{background:var(--surface2);}
.status-sq-sm{width:8px;height:8px;border-radius:2px;flex-shrink:0;}

.goal-row-header{display:grid;grid-template-columns:1fr 30px 160px 120px;gap:8px;padding:6px 20px;background:var(--surface);border-bottom:1px solid var(--border);position:sticky;top:0;z-index:5;}
.goal-row{display:grid;grid-template-columns:1fr 30px 160px 120px;align-items:center;gap:8px;padding:7px 20px;border-bottom:1px solid rgba(42,42,58,0.5);transition:background 0.1s;}
.goal-target-ro{font-size:0.78rem;color:var(--text-dim);padding:5px 9px;border:1px dashed var(--border);border-radius:8px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;font-style:italic;width:100%;}
.goal-target-ro.has-val{color:var(--text);font-style:normal;border-color:transparent;background:var(--surface2);}

/* ── ROUTINES ── */
.routine-add-btn{background:none;border:1px solid var(--border);border-radius:6px;padding:2px 10px;font-size:0.68rem;color:var(--text-dim);cursor:pointer;transition:all 0.15s;font-family:'Noto Sans KR',sans-serif;white-space:nowrap;}

.routine-period{font-family:'DM Mono',monospace;font-size:0.6rem;color:var(--text-dim);white-space:nowrap;}
.routine-del-btn{background:none;border:none;color:var(--text-dim);cursor:pointer;font-size:0.72rem;padding:1px 4px;border-radius:4px;opacity:0;transition:all 0.15s;}
.goal-row:hover .routine-del-btn{opacity:1;}
.routine-del-btn:hover{color:var(--red);}
.goal-row-name{display:flex;align-items:center;gap:4px;overflow:hidden;min-width:0;}

/* ── 오늘의 원씽 ── */
.wonsing-badge{font-size:0.7rem;font-weight:600;padding:2px 8px;border-radius:20px;white-space:nowrap;flex-shrink:0;}
.wonsing-cat-menu{position:absolute;right:0;top:calc(100%+4px);background:var(--surface);border:1px solid var(--border);border-radius:10px;overflow:hidden;z-index:200;box-shadow:0 8px 24px rgba(0,0,0,0.5);min-width:100px;}
.wonsing-cat-menu.hidden{display:none;}
.wonsing-cat-opt{padding:8px 14px;cursor:pointer;font-size:0.82rem;display:flex;align-items:center;gap:8px;transition:background 0.1s;font-family:'Noto Sans KR',sans-serif;}
.wonsing-cat-opt:hover{background:var(--surface2);}

/* ── ROUTINE MODAL ── */
.rmodal-field{display:flex;flex-direction:column;gap:5px;}
.rmodal-label{font-size:0.73rem;color:var(--text-dim);}
.rmodal-input{background:var(--surface2);border:1px solid var(--border);border-radius:8px;padding:8px 12px;color:var(--text);font-family:'Noto Sans KR',sans-serif;font-size:0.88rem;outline:none;width:100%;transition:border-color 0.15s;}
.rmodal-input:focus{border-color:var(--accent);}
.rmodal-row{display:grid;grid-template-columns:1fr 1fr;gap:10px;}

/* ── SHARED ── */
@keyframes slideIn{from{opacity:0;transform:translateY(-8px)}to{opacity:1;transform:translateY(0)}}
.spinner{width:16px;height:16px;border:2px solid var(--border);border-top-color:var(--accent);border-radius:50%;animation:spin 0.6s linear infinite;display:inline-block;}
@keyframes spin{to{transform:rotate(360deg)}}
.loading-row{display:flex;align-items:center;gap:10px;color:var(--text-dim);padding:40px;justify-content:center;font-size:0.88rem;}

@media(max-width:1100px){
  .goals-layout,.time-layout{grid-template-columns:1fr;}
  .goals-sidebar,.time-sidebar{border-left:none;border-top:1px solid var(--border);}
}
@media(max-width:800px){
  main{grid-template-columns:1fr;grid-template-rows:auto;height:auto;overflow:visible;}
  aside{height:auto;}
  .tab-pane{overflow:visible;}
}

function toKey(y,m,d){ return `${y}-${String(m+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`; }
function esc(s){ return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }
function fmtMin(min){
  if(!min||min<=0) return '0분';
  const h=Math.floor(min/60), m=min%60;
  if(h===0) return `${m}분`;
  if(m===0) return `${h}시간`;
  return `${h}시간 ${m}분`;
}
function setSyncState(state, msg){
  const el = document.getElementById('syncIndicator');
  el.className = 'sync-indicator ' + state;
  document.getElementById('syncText').textContent = msg;
}

// ── AUTH ──
(function initAuth(){
  const screen  = document.getElementById('authScreen');
  const emailEl = document.getElementById('authEmail');
  const passEl  = document.getElementById('authPassword');
  const btnEl   = document.getElementById('authBtn');
  const msgEl   = document.getElementById('authMsg');
  let mode = 'login';

  function setMode(m){
    mode=m;
    document.getElementById('tabLogin').classList.toggle('active',m==='login');
    document.getElementById('tabSignup').classList.toggle('active',m==='signup');
    btnEl.textContent = m==='login' ? '로그인' : '회원가입';
    msgEl.textContent=''; msgEl.className='auth-msg';
  }
  document.getElementById('tabLogin').addEventListener('click',()=>setMode('login'));
  document.getElementById('tabSignup').addEventListener('click',()=>setMode('signup'));

  async function doAuth(){
    const email=emailEl.value.trim(), pass=passEl.value;
    if(!email||!pass){ showMsg('이메일과 비밀번호를 입력하세요.','err'); return; }
    btnEl.disabled=true; btnEl.textContent='처리 중...';
    if(mode==='login'){
      const {data,error}=await sb.auth.signInWithPassword({email,password:pass});
      if(error) showMsg('이메일 또는 비밀번호가 틀렸습니다.','err');
      else { currentUser=data.user; screen.style.display='none'; onLoggedIn(); }
    } else {
      const {data,error}=await sb.auth.signUp({email,password:pass});
      if(error) showMsg(error.message,'err');
      else if(data.user&&data.user.identities&&data.user.identities.length===0) showMsg('이미 가입된 이메일입니다.','err');
      else { showMsg('가입 완료! 이메일 확인 후 로그인하세요.','ok'); setMode('login'); }
    }
    btnEl.disabled=false; btnEl.textContent=mode==='login'?'로그인':'회원가입';
  }
  function showMsg(txt,type){
    msgEl.textContent=txt; msgEl.className='auth-msg '+type;
    if(type==='err'){ passEl.style.animation='shake 0.3s ease'; setTimeout(()=>passEl.style.animation='',400); }
  }
  btnEl.addEventListener('click',doAuth);
  passEl.addEventListener('keydown',e=>{ if(e.key==='Enter') doAuth(); });
  sb.auth.getSession().then(({data})=>{
    if(data.session){ currentUser=data.session.user; screen.style.display='none'; onLoggedIn(); }
    else setTimeout(()=>emailEl.focus(),100);
  });
  document.getElementById('logoutBtn').addEventListener('click',async()=>{
    if(!confirm('로그아웃 할까요?')) return;
    await sb.auth.signOut(); currentUser=null;
    screen.style.display='flex'; passEl.value=''; setMode('login');
  });
})();

function onLoggedIn(){ initApp(); }

    today.toLocaleDateString('ko-KR',{year:'numeric',month:'long',day:'numeric'});

  // Tab switching
  document.querySelectorAll('.nav-tab').forEach(tab=>{
    tab.addEventListener('click',()=>{
      document.querySelectorAll('.nav-tab').forEach(t=>t.classList.remove('active'));
      tab.classList.add('active');
      document.querySelectorAll('.tab-pane').forEach(p=>p.classList.remove('active'));

  });
  document.getElementById('monthlyNextMonth').addEventListener('click',()=>{
    monthlyMonth++; if(monthlyMonth>11){monthlyMonth=0;monthlyYear++;}
    loadAndRenderMonthly();
  });
  document.getElementById('monthlyThisMonth').addEventListener('click',()=>{
    monthlyYear=today.getFullYear(); monthlyMonth=today.getMonth();
    loadAndRenderMonthly();
  });
  document.getElementById('monthlySettingsBtn').addEventListener('click',openMonthlySettings);
  document.getElementById('modalClose').addEventListener('click',closeMonthlySettings);
  document.getElementById('monthlySettingsModal').addEventListener('click',e=>{ if(e.target===e.currentTarget) closeMonthlySettings(); });
  document.getElementById('modalAddItemBtn').addEventListener('click',modalAddItem);
  document.getElementById('modalNewName').addEventListener('keydown',e=>{ if(e.key==='Enter') modalAddItem(); });
  document.getElementById('modalSaveBtn').addEventListener('click',saveMonthlyItems);

  // Save buttons
  document.getElementById('goalsSaveBtn').addEventListener('click',saveGoals);
  document.getElementById('timeSaveBtn').addEventListener('click',saveTime);

  // Gratitude
  document.getElementById('gratAddBtn').addEventListener('click',addGratitude);
  document.getElementById('gratInput').addEventListener('keydown',e=>{ if(e.key==='Enter') addGratitude(); });

  // KR add
  document.getElementById('krAddBtn').addEventListener('click',showKrDialog);

  document.addEventListener('click', ()=>{
    document.querySelectorAll('.status-menu:not(.hidden),.wonsing-cat-menu:not(.hidden)').forEach(m=>m.classList.add('hidden'));

// ── DATE HELPERS ──
function moveDate(delta){
  const d=new Date(selectedDate); d.setDate(d.getDate()+delta);
  selectDate(d.toISOString().slice(0,10));
}
async function selectDate(key){
  selectedDate=key;
  const [y,m]=key.split('-').map(Number);
  viewYear=y; viewMonth=m-1;
  renderCalendar(); renderDateLabels();
  setSyncState('syncing','불러오는 중');
  await Promise.all([loadGoals(key), loadTime(key), loadKR()]);
  setSyncState('synced','동기화됨');
  renderGoals(); renderGoalsSidebar(); renderTime(); renderTimeChart(); renderGratitude(); calcStreak();
}
function renderDateLabels(){
  const [y,m,d]=selectedDate.split('-').map(Number);
  const dt=new Date(y,m-1,d);
  const isToday=selectedDate===todayKey;
  const dateStr=dt.toLocaleDateString('ko-KR',{month:'long',day:'numeric'});
  const weekday=dt.toLocaleDateString('ko-KR',{weekday:'long'});
  function set(lblId,subId){
    const lbl=document.getElementById(lblId);
    lbl.childNodes[0].textContent=isToday?'오늘 ':dateStr+' ';
    document.getElementById(subId).textContent=isToday?`${dateStr} ${weekday}`:weekday;
  }
  set('goalsDateLabel','goalsDateSub');
  set('timeDateLabel','timeDateSub');
  set('gratDateLabel','gratDateSub');
  const full=dt.toLocaleDateString('ko-KR',{year:'numeric',month:'long',day:'numeric',weekday:'long'});
  document.getElementById('gratDateFull').textContent=isToday?'오늘 · '+dateStr:full;
  const krLbl=document.getElementById('krMonthLabel');
  if(krLbl) krLbl.textContent=`${y}년 ${m}월`;
}

// ── CALENDAR ──
function renderCalendar(){
  document.getElementById('calMonthLabel').textContent=`${viewYear}년 ${viewMonth+1}월`;
  const grid=document.getElementById('calGrid');
  grid.innerHTML='';
  ['일','월','화','수','목','금','토'].forEach(d=>{
    const el=document.createElement('div'); el.className='cal-day-label'; el.textContent=d; grid.appendChild(el);
  });
  const firstDay=new Date(viewYear,viewMonth,1).getDay();
  const daysInMonth=new Date(viewYear,viewMonth+1,0).getDate();
  const daysInPrev=new Date(viewYear,viewMonth,0).getDate();
  for(let i=0;i<firstDay;i++) grid.appendChild(makeCell(viewYear,viewMonth-1,daysInPrev-firstDay+1+i,true));
  for(let d=1;d<=daysInMonth;d++) grid.appendChild(makeCell(viewYear,viewMonth,d,false));
  const rem=(firstDay+daysInMonth)%7;
  for(let d=1;d<=(rem===0?0:7-rem);d++) grid.appendChild(makeCell(viewYear,viewMonth+1,d,true));
}
function makeCell(y,m,d,other){
  const cell=document.createElement('div'); cell.className='cal-cell';
  let ry=y,rm=m;
  if(m<0){ry--;rm=11;} if(m>11){ry++;rm=0;}
  const key=toKey(ry,rm,d);
  cell.textContent=d;
  if(other) cell.classList.add('other-month');
  if(key===todayKey) cell.classList.add('today');
  if(key===selectedDate) cell.classList.add('selected');
  const hasGoals=goalRecords[key]&&goalRecords[key].some(r=>r.actual);
  const hasTime=timeRecords[key]&&timeRecords[key].some(r=>r.actual_min>0);
  const hasGrat=gratitudes[key]&&gratitudes[key].length>0;
  if(hasGoals||hasTime||hasGrat) cell.classList.add('has-data');
  cell.addEventListener('click',()=>selectDate(key));
  return cell;
}

// ── GOALS DATA ──
async function loadGoals(date){
  if(goalRecords[date]) return;
  const {data,error}=await sb.from('goal_records').select('*').eq('user_id',currentUser.id).eq('date',date);
  if(error){console.error(error);return;}
  goalRecords[date]=data||[];
}
function getGoalRec(date,catKey){
  return (goalRecords[date]||[]).find(r=>r.category===catKey)||null;
}
async function saveGoals(){
  const btn=document.getElementById('goalsSaveBtn');
  const status=document.getElementById('goalsSaveStatus');
  btn.disabled=true; setSyncState('syncing','저장 중');
  const rows=[];

  // 정적 그룹 rows (캘린더, 투자, 가족·업무)
  document.querySelectorAll('.goal-row[data-cat]').forEach(row=>{
    const grp=row.dataset.grp;
    const catKey=row.dataset.cat;
    const isCalendar=(grp==='캘린더');
    // 캘린더 그룹은 target을 DOM에서 읽지 않고 기존 DB 값 유지
    const existRec=getGoalRec(selectedDate,catKey);
    const targetVal=isCalendar
      ?(existRec?existRec.target:null)
      :(row.querySelector('.g-target')?.value.trim()||null);
    rows.push({
      user_id:currentUser.id, date:selectedDate,
      group_name:grp, category:catKey,
      is_important:row.querySelector('.star-btn').classList.contains('on'),
      target:targetVal,
      actual:row.querySelector('.status-wrap')?.dataset.value||null,
    });
  });

  // 루틴 rows
  document.querySelectorAll('.goal-row[data-routine-id]').forEach(row=>{
    const rid=row.dataset.routineId;
    const routine=userRoutines.find(r=>r.id===rid);
    if(!routine) return;
    rows.push({
      user_id:currentUser.id, date:selectedDate,
      group_name:'루틴', category:`루틴/${rid}`,
      is_important:row.querySelector('.star-btn').classList.contains('on'),
      target:routine.default_target||null,
      actual:row.querySelector('.status-wrap')?.dataset.value||null,
    });
  });

  const {error}=await sb.from('goal_records').upsert(rows,{onConflict:'user_id,date,category'});
  btn.disabled=false;
  if(error){console.error(error);setSyncState('error','저장 실패');status.textContent='저장 실패';return;}
  goalRecords[selectedDate]=rows.map(r=>({...r}));
  setSyncState('synced','저장됨');
  status.textContent='저장됐습니다 ✓';
  setTimeout(()=>status.textContent='',2500);
  renderCalendar();
}

// ── STATUS DROPDOWN HELPER ──
function makeStatusWrap(currentValue){
  const optDef=STATUS_OPTIONS.find(o=>o.value===currentValue)||STATUS_OPTIONS[0];
  const wrap=document.createElement('div');
  wrap.className='status-wrap';
  wrap.dataset.value=currentValue;

  const btn=document.createElement('button');
  btn.type='button';
  btn.className='status-btn';

  const sq=document.createElement('span');
  sq.className='status-sq';
  sq.style.background=optDef.color;

  const lbl=document.createElement('span');
  lbl.className='status-lbl'+(currentValue?'':' dim');
  lbl.textContent=optDef.label;

  const arrow=document.createElement('span');
  arrow.className='status-arrow';
  arrow.textContent='▾';

  btn.append(sq,lbl,arrow);

  const menu=document.createElement('div');
  menu.className='status-menu hidden';

  STATUS_OPTIONS.forEach(o=>{
    const item=document.createElement('div');
    item.className='status-opt';
    item.innerHTML=`<span class="status-sq-sm" style="background:${o.color}"></span>${o.label}`;
    item.addEventListener('click',(e)=>{
      e.stopPropagation();
      wrap.dataset.value=o.value;
      sq.style.background=o.color;
      lbl.textContent=o.label;
      lbl.className='status-lbl'+(o.value?'':' dim');
      menu.classList.add('hidden');
    });
    menu.appendChild(item);
  });

  btn.addEventListener('click',(e)=>{
    e.stopPropagation();
    document.querySelectorAll('.status-menu:not(.hidden)').forEach(m=>m.classList.add('hidden'));
    menu.classList.toggle('hidden');
  });

  wrap.append(btn,menu);
  return wrap;
}

// ── GOALS RENDER ──

    grpEl.className='goal-group';

    if(grpDef.wonsing){
      const wonsingRecs=(goalRecords[selectedDate]||[]).filter(r=>r.group_name==='오늘의 원씽');
      const addedCats=new Set(wonsingRecs.map(r=>r.category.split('/')[1]));

      const hdEl=document.createElement('div'); hdEl.className='goal-group-hd';

      const hdRight=document.createElement('div');

      const addBtn=document.createElement('button');
      addBtn.className='routine-add-btn';
      addBtn.textContent='+ 추가';
      addBtn.disabled=(availableCats.length===0);

      const catMenu=document.createElement('div');
      catMenu.className='wonsing-cat-menu hidden';
      availableCats.forEach(c=>{
        const opt=document.createElement('div');
        opt.className='wonsing-cat-opt';
        opt.innerHTML=`<span class="status-sq-sm" style="background:${c.color}"></span>${c.cat}`;
        opt.addEventListener('click',(e)=>{
          e.stopPropagation();
          catMenu.classList.add('hidden');
          addWonsingEntry(c);
        });
        catMenu.appendChild(opt);
      });
      addBtn.addEventListener('click',(e)=>{
        e.stopPropagation();
        document.querySelectorAll('.wonsing-cat-menu:not(.hidden)').forEach(m=>m.classList.add('hidden'));
        catMenu.classList.toggle('hidden');
      });

      const toggleSpan=document.createElement('span');
      toggleSpan.className='goal-group-toggle'; toggleSpan.textContent='▾';
      hdRight.append(addBtn,catMenu,toggleSpan);
      hdEl.append(hdLeft,hdRight);
      hdEl.addEventListener('click',()=>grpEl.classList.toggle('collapsed'));
      grpEl.appendChild(hdEl);

      const body=document.createElement('div'); body.className='goal-group-body';
      if(wonsingRecs.length===0){
        const empty=document.createElement('div');
        empty.style.cssText='padding:14px 20px;font-size:0.8rem;color:var(--text-dim);';
        empty.textContent='+ 추가를 눌러 오늘의 원씽을 설정하세요.';
        body.appendChild(empty);
      } else {
        // 카테고리 순서대로 정렬
        const catOrder=WONSING_CATS.map(c=>`오늘의 원씽/${c.cat}`);
        wonsingRecs.sort((a,b)=>catOrder.indexOf(a.category)-catOrder.indexOf(b.category));
        wonsingRecs.forEach(rec=>{
          const catName=rec.category.split('/')[1];
          const catDef=WONSING_CATS.find(c=>c.cat===catName);
          if(!catDef) return;
          body.appendChild(makeWonsingRow(rec.category,catDef,rec));
        });
      }
      grpEl.appendChild(body);
      container.appendChild(grpEl);
      return; // forEach의 나머지 로직 스킵
    }

    const hdEl=document.createElement('div');
    hdEl.className='goal-group-hd';
    let hdLabel=grpDef.group;

    hdEl.addEventListener('click',()=>grpEl.classList.toggle('collapsed'));
    grpEl.appendChild(hdEl);

    const body=document.createElement('div');
    body.className='goal-group-body';

    grpDef.items.forEach(item=>{
      const catKey=grpDef.group+'/'+item.cat;

      const isImportant=rec?rec.is_important:false;
      const targetVal=rec?(rec.target||''):(item.defaultTarget||'');
      const actualVal=rec?(rec.actual||''):'';

      const row=document.createElement('div');
      row.className='goal-row';
      row.dataset.cat=catKey;
      row.dataset.grp=grpDef.group;

      // 이름
      const nameWrap=document.createElement('div');
      nameWrap.className='goal-row-name';
      const nameSpan=document.createElement('span');
      nameSpan.className='goal-cat-name';
      nameSpan.textContent=item.cat;
      nameWrap.appendChild(nameSpan);

      // 별
      const starBtn=document.createElement('button');
      starBtn.className='star-btn'+(isImportant?' on':'');
      starBtn.textContent='★';
      starBtn.addEventListener('click',function(){this.classList.toggle('on');});

      // 목표
      let targetEl;
      if(grpDef.fromMonthly){
        targetEl=document.createElement('div');
        targetEl.className='goal-target-ro'+(targetVal?' has-val':'');

        targetEl.title=targetVal||'';

        targetEl=document.createElement('input');
        targetEl.className='goal-input g-target';

        targetEl.value=targetVal;
        targetEl.placeholder='목표';
      }

      // 실적 (상태 드롭다운)
      const statusWrap=makeStatusWrap(actualVal);

      row.append(nameWrap,starBtn,targetEl,statusWrap);
      body.appendChild(row);
    });

    grpEl.appendChild(body);
    container.appendChild(grpEl);
  });

  // ── 루틴 그룹 (동적) ──
  const activeRoutines=getActiveRoutines(selectedDate);
  const routineGrpEl=document.createElement('div');
  routineGrpEl.className='goal-group';

  const routineHdEl=document.createElement('div');
  routineHdEl.className='goal-group-hd';
  routineHdEl.style.cursor='pointer';

  const routineHdLeft=document.createElement('span');
  routineHdLeft.textContent='루틴';
  const routineHdRight=document.createElement('div');
  routineHdRight.style.cssText='display:flex;align-items:center;gap:8px;';

  const addRoutineBtn=document.createElement('button');
  addRoutineBtn.className='routine-add-btn';
  addRoutineBtn.textContent='+ 추가';
  addRoutineBtn.addEventListener('click',(e)=>{e.stopPropagation();openRoutineModal();});

  const toggleSpan=document.createElement('span');
  toggleSpan.className='goal-group-toggle';
  toggleSpan.textContent='▾';

  routineHdRight.append(addRoutineBtn,toggleSpan);
  routineHdEl.append(routineHdLeft,routineHdRight);
  routineHdEl.addEventListener('click',()=>routineGrpEl.classList.toggle('collapsed'));
  routineGrpEl.appendChild(routineHdEl);

  const routineBody=document.createElement('div');
  routineBody.className='goal-group-body';

  if(activeRoutines.length===0){
    const emptyEl=document.createElement('div');
    emptyEl.style.cssText='padding:14px 20px;font-size:0.8rem;color:var(--text-dim);';
    emptyEl.textContent='이 날짜에 활성된 루틴이 없습니다. + 추가를 눌러 루틴을 등록하세요.';
    routineBody.appendChild(emptyEl);
  } else {
    activeRoutines.forEach(routine=>{
      const catKey=`루틴/${routine.id}`;
      const rec=getGoalRec(selectedDate,catKey);
      const isImportant=rec?rec.is_important:false;
      const actualVal=rec?(rec.actual||''):'';

      const row=document.createElement('div');
      row.className='goal-row';
      row.dataset.routineId=routine.id;
      row.dataset.grp='루틴';

      const nameWrap=document.createElement('div');
      nameWrap.className='goal-row-name';
      const nameSpan=document.createElement('span');
      nameSpan.className='goal-cat-name';
      nameSpan.textContent=routine.name;
      const periodSpan=document.createElement('span');
      periodSpan.className='routine-period';
      periodSpan.textContent=`(${routine.start_date.slice(5)}~${routine.end_date.slice(5)})`;
      const delBtn=document.createElement('button');
      delBtn.className='routine-del-btn';
      delBtn.textContent='✕';
      delBtn.title='루틴 삭제';
      delBtn.addEventListener('click',(e)=>{e.stopPropagation();deleteRoutine(routine.id);});
      nameWrap.append(nameSpan,periodSpan,delBtn);

      const starBtn=document.createElement('button');
      starBtn.className='star-btn'+(isImportant?' on':'');
      starBtn.textContent='★';
      starBtn.addEventListener('click',function(){this.classList.toggle('on');});

      const targetRo=document.createElement('div');
      targetRo.className='goal-target-ro'+(routine.default_target?' has-val':'');
      targetRo.textContent=routine.default_target||'';

      const statusWrap=makeStatusWrap(actualVal);

      row.append(nameWrap,starBtn,targetRo,statusWrap);
      routineBody.appendChild(row);
    });
  }

  routineGrpEl.appendChild(routineBody);
  container.appendChild(routineGrpEl);
}

function addWonsingEntry(catDef){
  const catKey=`오늘의 원씽/${catDef.cat}`;
  // 로컬 상태에 추가 (아직 DB에 저장 안 됨 — 저장 버튼 클릭 시 저장)
  if(!goalRecords[selectedDate]) goalRecords[selectedDate]=[];
  if(!goalRecords[selectedDate].find(r=>r.category===catKey)){
    goalRecords[selectedDate].push({
      user_id:currentUser.id, date:selectedDate,
      group_name:'오늘의 원씽', category:catKey,
      is_important:false, target:'', actual:'',
    });
  }
  renderGoals();
}

async function deleteWonsingEntry(catKey){
  // DB에 저장된 레코드가 있으면 삭제
  const existRec=getGoalRec(selectedDate,catKey);
  if(existRec&&existRec.id){
    const {error}=await sb.from('goal_records').delete()
      .eq('user_id',currentUser.id).eq('date',selectedDate).eq('category',catKey);
    if(error){console.error(error);return;}
  }
  if(goalRecords[selectedDate]){
    goalRecords[selectedDate]=goalRecords[selectedDate].filter(r=>r.category!==catKey);
  }
  renderGoals();
}

function updateTimeSummary(){

  bar.innerHTML=`
    <span style="font-size:0.8rem;color:var(--text-dim);">오늘 기록</span>
    <span class="time-chip ${cls}">실적 ${fmtMin(totalA)}</span>
    <span class="time-chip dim">목표 ${fmtMin(totalT)}</span>
    ${totalT>0?`<span class="time-chip ${cls}">${pct}%</span>`:''}

}

// ── TIME RENDER ──
function renderTime(){
  const container=document.getElementById('timeMain');
  container.innerHTML='';
  const header=document.createElement('div');
  header.className='time-row-header';
  header.innerHTML=`<span class="col-lbl">항목</span><span class="col-lbl" style="text-align:center;">목표(분)</span><span class="col-lbl" style="text-align:center;">실적(분)</span><span class="col-lbl" style="text-align:center;">차이</span>`;
  container.appendChild(header);

  Object.entries(TIME_CATS).forEach(([main,subs])=>{
    const grpEl=document.createElement('div');
    grpEl.className='time-group';

    let grpActual=0;
    subs.forEach(sub=>{ const r=getTimeRec(selectedDate,main,sub); grpActual+=r?r.actual_min:0; });

    const hdEl=document.createElement('div');
    hdEl.className='time-group-hd';
    hdEl.innerHTML=`<span>${esc(main)}</span><div class="time-group-sum">${grpActual>0?`<span>${fmtMin(grpActual)}</span>`:''}<span>▾</span></div>`;
    hdEl.addEventListener('click',()=>grpEl.classList.toggle('collapsed'));
    grpEl.appendChild(hdEl);

    const body=document.createElement('div');
    body.className='time-group-body';
    subs.forEach(sub=>{
      const rec=getTimeRec(selectedDate,main,sub);
      const tgt=rec?rec.target_min:0;
      const act=rec?rec.actual_min:0;
      const diff=act-tgt;

      const row=document.createElement('div');
      row.className='time-row';
      row.dataset.main=main; row.dataset.sub=sub;
      row.innerHTML=`
        <span class="time-cat">${esc(sub)}</span>
        <input class="time-input t-target" type="number" min="0" step="10" value="${tgt}" placeholder="0">
        <input class="time-input t-actual" type="number" min="0" step="10" value="${act}" placeholder="0">
        <span class="time-diff ${diff>0?'pos':diff<0?'neg':'zero'}">${diff>0?'+':diff<0?'-':''}${diff!==0?fmtMin(Math.abs(diff)):'-'}</span>
      `;
      const updateDiff=()=>{
        const t=parseInt(row.querySelector('.t-target').value)||0;
        const a=parseInt(row.querySelector('.t-actual').value)||0;
        const d=a-t;
        const el=row.querySelector('.time-diff');
        el.textContent=d>0?`+${fmtMin(d)}`:d<0?`-${fmtMin(Math.abs(d))}`:'-';
        el.className=`time-diff ${d>0?'pos':d<0?'neg':'zero'}`;
        updateTimeSummary();
      };
      row.querySelector('.t-target').addEventListener('input',updateDiff);
      row.querySelector('.t-actual').addEventListener('input',updateDiff);
      body.appendChild(row);
    });
    grpEl.appendChild(body);
    container.appendChild(grpEl);
  });
  updateTimeSummary();
}
function renderTimeChart(){
  const chart=document.getElementById('timeChart');
  if(!chart) return;
  const totals={};
  (timeRecords[selectedDate]||[]).forEach(r=>{ totals[r.main_cat]=(totals[r.main_cat]||0)+r.actual_min; });
  const maxVal=Math.max(...Object.values(totals),1);
  chart.innerHTML='';
  Object.keys(TIME_CATS).forEach(main=>{
    const val=totals[main]||0;
    const pct=maxVal>0?Math.round(val/maxVal*100):0;
    const color=CAT_COLORS[main]||'#7c6af7';
    const row=document.createElement('div');
    row.className='bar-row';
    row.innerHTML=`
      <span class="bar-lbl">${main}</span>
      <div class="bar-track"><div class="bar-fill" style="width:${pct}%;background:${color};">${pct>25?`<span class="bar-fill-txt">${fmtMin(val)}</span>`:''}</div></div>
      <span class="bar-val">${fmtMin(val)}</span>
    `;
    chart.appendChild(row);
  });
}

// ── 달력 렌더 ──
function renderMonthlyCalendar(){
  document.getElementById('monthlyMonthLabel').textContent=`${monthlyYear}년 ${monthlyMonth+1}월`;

  const container=document.getElementById('monthlyCalArea');
  container.innerHTML='';

  // Day-of-week header (일~토)
  const dows=['일','월','화','수','목','금','토'];
  const dowClasses=['sun','','','','','sat',''];
  const headerDiv=document.createElement('div');
  headerDiv.className='monthly-cal-header';
  dows.forEach((d,i)=>{
    const el=document.createElement('div');
    el.className='monthly-cal-dow'+(dowClasses[i]?' '+dowClasses[i]:'');
    el.textContent=d;
    headerDiv.appendChild(el);
  });
  container.appendChild(headerDiv);

  const grid=document.createElement('div');
  grid.className='monthly-cal-grid';

  const firstDow=new Date(monthlyYear,monthlyMonth,1).getDay(); // 0=Sun
  const daysInMonth=new Date(monthlyYear,monthlyMonth+1,0).getDate();
  const daysInPrev=new Date(monthlyYear,monthlyMonth,0).getDate();
  const monthStr=`${monthlyYear}-${String(monthlyMonth+1).padStart(2,'0')}`;

  // Prev month padding
  for(let i=0;i<firstDow;i++){
    const d=daysInPrev-firstDow+1+i;
    let py=monthlyYear, pm=monthlyMonth-1;
    if(pm<0){pm=11;py--;}
    const key=toKey(py,pm,d);
    grid.appendChild(makeMonthlyCellEl(key,d,true));
  }
  // This month
  for(let d=1;d<=daysInMonth;d++){
    const key=toKey(monthlyYear,monthlyMonth,d);
    const dow=new Date(monthlyYear,monthlyMonth,d).getDay();
    grid.appendChild(makeMonthlyCellEl(key,d,false,dow));
  }
  // Next month padding
  const totalCells=firstDow+daysInMonth;
  const rem=totalCells%7;
  if(rem>0){
    for(let d=1;d<=7-rem;d++){
      let ny=monthlyYear, nm=monthlyMonth+1;
      if(nm>11){nm=0;ny++;}
      const key=toKey(ny,nm,d);
      grid.appendChild(makeMonthlyCellEl(key,d,true));
    }
  }

  container.appendChild(grid);

  // If there was a selected day still in this month, re-render panel; else clear it
  if(selectedMonthDay && selectedMonthDay.startsWith(monthStr)){
    renderDayPanel(selectedMonthDay);
  } else {
    selectedMonthDay=null;
    document.getElementById('monthlyDayPanel').innerHTML=
      '<div class="day-panel-empty">날짜를 클릭하면<br>일별 계획을 입력할 수 있어요</div>';
  }
}

function makeMonthlyCellEl(dateStr, dayNum, otherMonth, dow){
  const cell=document.createElement('div');
  cell.className='monthly-day-cell';
  if(otherMonth){ cell.classList.add('other-month'); }
  if(dateStr===todayKey) cell.classList.add('today');
  if(dateStr===selectedMonthDay) cell.classList.add('cal-selected');
  if(!otherMonth){
    if(dow===0) cell.classList.add('sun');
    if(dow===6) cell.classList.add('sat');
  }

  const numEl=document.createElement('div');
  numEl.className='monthly-day-num';
  numEl.textContent=dayNum;
  cell.appendChild(numEl);

  // Show chips for items that have content
  if(!otherMonth){
    monthlyItems.forEach(item=>{
      const content=monthlyPlans[dateStr+'_'+item.id]||'';
      if(!content) return;
      const chip=document.createElement('div');
      chip.className='monthly-chip';
      chip.style.background=hexToRgba(item.color,0.18);
      chip.style.color=item.color;
      chip.textContent=item.name+(content?` · ${content}`:'');
      chip.title=`${item.name}: ${content}`;
      cell.appendChild(chip);
    });
  }

  if(!otherMonth){
    cell.addEventListener('click',()=>{
      selectedMonthDay=dateStr;
      // Update selection highlight
      document.querySelectorAll('.monthly-day-cell').forEach(c=>c.classList.remove('cal-selected'));
      cell.classList.add('cal-selected');
      renderDayPanel(dateStr);
    });
  }
  return cell;
}

function hexToRgba(hex,alpha){
  const r=parseInt(hex.slice(1,3),16);
  const g=parseInt(hex.slice(3,5),16);
  const b=parseInt(hex.slice(5,7),16);
  return `rgba(${r},${g},${b},${alpha})`;
}

// ── Day detail panel ──
function renderDayPanel(dateStr){
  const panel=document.getElementById('monthlyDayPanel');
  const [y,m,d]=dateStr.split('-').map(Number);
  const dt=new Date(y,m-1,d);
  const dateLabel=dt.toLocaleDateString('ko-KR',{month:'long',day:'numeric'});
  const weekday=dt.toLocaleDateString('ko-KR',{weekday:'long'});

  panel.innerHTML='';

  const header=document.createElement('div');
  header.className='day-panel-header';
  const isToday=dateStr===todayKey;
  header.innerHTML=`
    <div class="day-panel-date">${isToday?'🌟 오늘 · ':''}<span>${dateLabel}</span></div>
    <div class="day-panel-weekday">${weekday}</div>
  `;
  panel.appendChild(header);

  if(monthlyItems.length===0){
    panel.innerHTML+='<div class="day-panel-empty">⚙ 항목 설정에서<br>항목을 추가해주세요</div>';
    return;
  }

  const itemsWrap=document.createElement('div');
  itemsWrap.className='day-panel-items';

  monthlyItems.forEach(item=>{
    const planKey=dateStr+'_'+item.id;
    const content=monthlyPlans[planKey]||'';

    const wrap=document.createElement('div');
    wrap.className='day-panel-item';

    const label=document.createElement('div');
    label.className='day-panel-label';
    label.innerHTML=`<span class="day-panel-dot" style="background:${esc(item.color)};"></span>${esc(item.name)}`;

    const ta=document.createElement('textarea');
    ta.className='day-panel-input';
    ta.rows=2;
    ta.value=content;
    ta.placeholder='입력...';
    ta.dataset.date=dateStr;
    ta.dataset.itemId=item.id;
    ta.dataset.goalCat=item.goal_cat||'';

    ta.addEventListener('input',function(){
      debounceSaveMonthlyCell(this.dataset.date, this.dataset.itemId, this.dataset.goalCat, this.value);
    });
    ta.addEventListener('change',function(){
      // Immediately refresh chips in the calendar cell
      refreshCalendarCell(this.dataset.date);
    });

    wrap.appendChild(label);
    wrap.appendChild(ta);
    itemsWrap.appendChild(wrap);
  });

  panel.appendChild(itemsWrap);
}

// Refresh a single calendar cell's chips without full re-render
function refreshCalendarCell(dateStr){
  const cells=document.querySelectorAll('.monthly-day-cell:not(.other-month)');
  cells.forEach(cell=>{
    const numEl=cell.querySelector('.monthly-day-num');
    if(!numEl) return;
    const d=parseInt(numEl.textContent);
    const key=toKey(monthlyYear,monthlyMonth,d);
    if(key!==dateStr) return;

    // Remove existing chips
    cell.querySelectorAll('.monthly-chip').forEach(c=>c.remove());
    // Re-add
    monthlyItems.forEach(item=>{
      const content=monthlyPlans[dateStr+'_'+item.id]||'';
      if(!content) return;
      const chip=document.createElement('div');
      chip.className='monthly-chip';
      chip.style.background=hexToRgba(item.color,0.18);
      chip.style.color=item.color;
      chip.textContent=item.name+(content?` · ${content}`:'');
      chip.title=`${item.name}: ${content}`;
      cell.appendChild(chip);
    });
  });
}

// ── MONTHLY SAVE (debounced) ──
function debounceSaveMonthlyCell(dateStr, itemId, goalCat, content){
  const key=dateStr+'_'+itemId;
  clearTimeout(monthlyDebounceTimers[key]);
  monthlyDebounceTimers[key]=setTimeout(()=>saveMonthlyCell(dateStr,itemId,goalCat,content), 600);
}

async function saveMonthlyCell(dateStr, itemId, goalCat, content){
  monthlyPlans[dateStr+'_'+itemId]=content;
  setSyncState('syncing','저장 중');

  const {error}=await sb.from('monthly_plans').upsert({
    user_id:currentUser.id, date:dateStr, item_id:itemId, content,
  },{onConflict:'user_id,date,item_id'});

  if(error){ console.error(error); setSyncState('error','저장 실패'); return; }
  setSyncState('synced','저장됨');
  refreshCalendarCell(dateStr);

  // Sync target → goal_records
  if(goalCat){
    const parts=goalCat.split('/');
    const groupName=parts[0]||'';
    await sb.from('goal_records').upsert({
      user_id:currentUser.id, date:dateStr,
      group_name:groupName, category:goalCat,
      is_important:false,
      target:content||null, actual:null,
    },{onConflict:'user_id,date,category',ignoreDuplicates:false});
    delete goalRecords[dateStr];
  }
}

// ── MONTHLY SETTINGS MODAL ──
function openMonthlySettings(){
  renderModalItems();
  document.getElementById('monthlySettingsModal').classList.remove('hidden');
}
function closeMonthlySettings(){
  document.getElementById('monthlySettingsModal').classList.add('hidden');
}
function renderModalItems(){
  const list=document.getElementById('modalItemsList');
  list.innerHTML='';
  // Build all possible goal_cat options
  const catOptions=GOAL_GROUPS.flatMap(g=>g.items.map(i=>({val:`${g.group}/${i.cat}`,lbl:`${g.group} / ${i.cat}`})));

  monthlyItems.forEach((item,idx)=>{
    const row=document.createElement('div');
    row.className='modal-item-row';
    row.dataset.idx=idx;

    const colorPicker=document.createElement('input');
    colorPicker.type='color';
    colorPicker.value=item.color||'#7c6af7';
    colorPicker.className='modal-item-color';
    colorPicker.title='색상 변경';

    const nameInput=document.createElement('input');
    nameInput.type='text';
    nameInput.className='modal-item-name';
    nameInput.value=item.name;
    nameInput.placeholder='항목 이름';

    const catSelect=document.createElement('select');
    catSelect.className='modal-item-cat';
    catSelect.title='목표/실적 연동 카테고리';
    const noneOpt=document.createElement('option');
    noneOpt.value=''; noneOpt.textContent='연동 없음';
    catSelect.appendChild(noneOpt);
    catOptions.forEach(opt=>{
      const o=document.createElement('option');
      o.value=opt.val; o.textContent=opt.lbl;
      if(item.goal_cat===opt.val) o.selected=true;
      catSelect.appendChild(o);
    });

    const delBtn=document.createElement('button');
    delBtn.className='modal-item-del';
    delBtn.textContent='✕';
    delBtn.title='삭제';
    delBtn.addEventListener('click',()=>{ monthlyItems.splice(idx,1); renderModalItems(); });

    row.appendChild(colorPicker);
    row.appendChild(nameInput);
    row.appendChild(catSelect);
    row.appendChild(delBtn);
    list.appendChild(row);
  });
}
function modalAddItem(){
  const input=document.getElementById('modalNewName');
  const name=input.value.trim();
  if(!name) return;
  monthlyItems.push({ id:null, user_id:currentUser.id, name, color:'#7c6af7', goal_cat:'', sort_order:monthlyItems.length });
  input.value='';
  renderModalItems();
}
async function saveMonthlyItems(){
  const btn=document.getElementById('modalSaveBtn');
  btn.disabled=true; btn.textContent='저장 중...';

  const rows=document.querySelectorAll('#modalItemsList .modal-item-row');
  const updated=[];
  rows.forEach((row,i)=>{
    const idx=parseInt(row.dataset.idx);
    const existingItem=monthlyItems[idx]||{};
    const name=row.querySelector('.modal-item-name').value.trim();
    const color=row.querySelector('input[type=color]').value;
    const goal_cat=row.querySelector('.modal-item-cat').value;
    if(!name) return;
    const entry={ user_id:currentUser.id, name, color, goal_cat:goal_cat||null, sort_order:i };
    if(existingItem.id) entry.id=existingItem.id;
    updated.push(entry);
  });

  // Delete removed items
  const keptIds=new Set(updated.filter(u=>u.id).map(u=>u.id));
  const toDelete=monthlyItems.filter(it=>it.id&&!keptIds.has(it.id)).map(it=>it.id);
  if(toDelete.length){
    await sb.from('monthly_items').delete().in('id',toDelete);
  }

  // Insert new items (no id), update existing (has id)
  const newItems=updated.filter(u=>!u.id);
  const existItems=updated.filter(u=>u.id);
  let allSaved=[];

  if(existItems.length){
    const {data,error}=await sb.from('monthly_items').upsert(existItems,{onConflict:'id'}).select();
    if(error){ console.error(error); btn.disabled=false; btn.textContent='저장'; return; }
    allSaved=allSaved.concat(data||[]);
  }
  if(newItems.length){
    const {data,error}=await sb.from('monthly_items').insert(newItems).select();
    if(error){ console.error(error); btn.disabled=false; btn.textContent='저장'; return; }
    allSaved=allSaved.concat(data||[]);
  }

  monthlyItems=allSaved.sort((a,b)=>a.sort_order-b.sort_order);
  btn.disabled=false; btn.textContent='저장';
  closeMonthlySettings();
  await loadMonthlyData();
  renderMonthlyCalendar();
}

// Trigger monthly load when tab is first opened
let monthlyLoaded=false;
document.querySelectorAll('.nav-tab').forEach(tab=>{
  tab.addEventListener('click',()=>{
    if(tab.dataset.tab==='monthly'&&!monthlyLoaded){
      monthlyLoaded=true;
      loadAndRenderMonthly();
    }
  });
});
